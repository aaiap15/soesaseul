<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>쇠사슬 · 크루로 운동 지속</title>
<meta name="description" content="같이 운동하자는 약속이 흐지부지되지 않게. 크루의 쇠사슬(공동 스트릭)로 서로 끌고 가는 운동 지속 앱." />
<meta property="og:title" content="쇠사슬 · 우리가 얼마나 쌓았나" />
<meta property="og:description" content="한 명이 빠지면 사슬이 끊긴다. 크루로 함께 쌓는 운동 스트릭." />
<style>
  :root{
    --bg:#f2f4f7; --card:#ffffff; --card2:#eef1f5; --line:#e5e8ee; --txt:#1a1d23; --sub:#667085; --dim:#98a2b3;
    --accent:#f5501a; --accent2:#ff7a42; --gold:#e39a00; --chick:#f97316; --ok:#12b886; --danger:#f04438;
    --radius:20px; --maxw:500px;
    --shadow:0 1px 2px rgba(16,24,40,.04),0 6px 20px rgba(16,24,40,.06);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--txt);line-height:1.5;padding-bottom:110px}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 16px}
  a{color:inherit}

  header{position:sticky;top:0;z-index:20;background:rgba(242,244,247,.85);backdrop-filter:blur(10px);
    padding:14px 0 12px;border-bottom:1px solid var(--line)}
  header .wrap{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .logo{font-size:20px;font-weight:900;letter-spacing:-.02em;cursor:pointer;display:flex;align-items:center;gap:6px}
  .logo b{color:var(--accent)}
  .mode{font-size:11px;font-weight:800;padding:4px 9px;border-radius:999px;background:var(--card);border:1px solid var(--line);color:var(--dim)}
  .mode.live{color:var(--ok);border-color:rgba(53,208,165,.4)}

  h1{font-size:26px;font-weight:900;letter-spacing:-.02em;line-height:1.28}
  .lead{color:var(--sub);font-size:15px;margin-top:12px}
  .accent{color:var(--accent)}

  .btn{display:block;width:100%;text-align:center;border:none;cursor:pointer;font-family:inherit;
    font-weight:850;font-size:16px;padding:16px;border-radius:14px}
  .btn.primary{background:linear-gradient(120deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 10px 26px rgba(255,90,31,.32)}
  .btn.ghost{background:var(--card);color:var(--txt);border:1px solid var(--line)}
  .btn:active{transform:translateY(1px)}
  .btn + .btn{margin-top:10px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
  .card + .card{margin-top:12px}

  /* home crew list */
  .crewitem{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
    border-radius:18px;padding:16px;margin-top:10px;cursor:pointer;box-shadow:var(--shadow)}
  .crewitem:active{transform:scale(.99)}
  .crewitem .ci-ic{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-size:22px;flex:none;
    background:linear-gradient(135deg,rgba(255,201,77,.18),rgba(255,90,31,.16))}
  .crewitem .ci-n{font-weight:850;font-size:16px}
  .crewitem .ci-m{color:var(--sub);font-size:13px;margin-top:2px}
  .crewitem .ci-chain{margin-left:auto;text-align:right}
  .crewitem .ci-chain b{font-size:20px;font-weight:900;color:var(--gold)}
  .crewitem .ci-chain span{display:block;font-size:11px;color:var(--dim)}

  /* ── 계정/프로필 ── */
  .profbtn{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:var(--card);overflow:hidden;
    cursor:pointer;padding:0;display:grid;place-items:center;font-weight:900;color:var(--accent);box-shadow:var(--shadow)}
  .profbtn img{width:100%;height:100%;object-fit:cover}
  .segbtns{display:flex;background:var(--card2);border-radius:12px;padding:4px;margin-bottom:4px}
  .segb{flex:1;border:none;background:transparent;font-weight:800;font-size:14px;padding:11px;border-radius:9px;cursor:pointer;color:var(--sub)}
  .segb.on{background:#fff;color:var(--txt);box-shadow:var(--shadow)}
  .avataredit{width:96px;height:96px;border-radius:50%;border:2px dashed #f2c99a;background:#fff8f0;color:var(--accent);
    display:grid;place-items:center;font-weight:900;font-size:18px;margin:4px auto;cursor:pointer;overflow:hidden;line-height:1.15}
  .avataredit img{width:100%;height:100%;object-fit:cover}
  .avataredit small{font-size:11px;font-weight:700}
  .avatarbig{width:92px;height:92px;border-radius:50%;margin:0 auto;display:grid;place-items:center;overflow:hidden;
    font-size:38px;font-weight:900;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:var(--shadow)}
  .avatarbig img{width:100%;height:100%;object-fit:cover}
  .statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
  .statc{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 6px;text-align:center;box-shadow:var(--shadow)}
  .statc b{display:block;font-size:22px;font-weight:900;color:var(--accent)}
  .statc span{font-size:11px;color:var(--sub);font-weight:700}
  .linkback{background:transparent;border:none;color:var(--sub);font-weight:800;font-size:15px;cursor:pointer;padding:0}

  /* chain hero */
  .chainhero{background:linear-gradient(165deg,#fff6e9,#ffffff 60%);border:1px solid #f4e6cf;
    border-radius:24px;padding:24px 20px;text-align:center;position:relative;overflow:hidden;
    box-shadow:0 2px 6px rgba(227,154,0,.06),0 12px 30px rgba(227,154,0,.08)}
  .chainhero .lbl{color:var(--sub);font-size:13px;font-weight:700}
  .chainbig{font-size:64px;font-weight:900;letter-spacing:-.03em;line-height:1;margin:6px 0 2px;
    background:linear-gradient(120deg,var(--gold),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .chainbig .u{font-size:24px;color:var(--sub);-webkit-text-fill-color:var(--sub)}
  .links{font-size:19px;letter-spacing:1px;margin:10px 0 4px;word-break:break-all;line-height:1.4}
  .chainmeta{display:flex;justify-content:center;gap:18px;margin-top:12px;flex-wrap:wrap}
  .chainmeta div{font-size:12.5px;color:var(--sub)}
  .chainmeta b{color:var(--txt);font-weight:800}
  .status{margin-top:14px;font-size:13.5px;font-weight:800;padding:10px;border-radius:12px}
  .status.safe{background:rgba(18,184,134,.12);color:var(--ok)}
  .status.risk{background:rgba(240,68,56,.1);color:var(--danger)}

  /* ── 쌓이는 쇠사슬 ── */
  .tier{display:inline-flex;align-items:center;gap:6px;font-weight:850;font-size:13px;
    background:#fff;border:1px solid var(--line);padding:5px 13px;border-radius:999px;box-shadow:var(--shadow)}
  .chainbig{cursor:default}
  .chainbig.bump{animation:bump .55s cubic-bezier(.2,1.5,.4,1)}
  @keyframes bump{30%{transform:scale(1.14)}60%{transform:scale(.97)}100%{transform:scale(1)}}
  .burst{position:absolute;top:78px;left:50%;transform:translateX(-50%);font-weight:900;color:var(--accent);
    font-size:18px;opacity:0;pointer-events:none;z-index:2;text-shadow:0 2px 8px rgba(245,80,26,.35)}
  .burst.go{animation:burst 1.1s ease forwards}
  @keyframes burst{0%{opacity:0;transform:translate(-50%,10px) scale(.7)}22%{opacity:1}100%{opacity:0;transform:translate(-50%,-30px) scale(1.15)}}
  .chainwrap{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;margin:16px auto 4px;max-width:290px;min-height:16px}
  .chainempty{color:var(--dim);font-size:13px;margin:16px 0 4px}
  .lnk{width:24px;height:12px;border-radius:7px;margin:2.5px -6px;flex:none;
    background:linear-gradient(150deg,#ffe6a8 0%,#f4b52e 46%,#d98a00 100%);
    border:1px solid rgba(170,110,0,.35);
    box-shadow:inset 0 1px 1px rgba(255,255,255,.75),inset 0 -1px 1px rgba(150,90,0,.28),0 1px 1px rgba(150,90,0,.15)}
  .lnk.head{background:linear-gradient(150deg,#ffd6ad,#ff7a42 58%,#f5501a);border-color:rgba(200,60,10,.4);
    box-shadow:inset 0 1px 1px rgba(255,255,255,.6),0 0 0 2px rgba(245,80,26,.14),0 0 12px rgba(245,80,26,.5);
    animation:beat 1.5s ease-in-out infinite;z-index:1}
  @keyframes beat{50%{box-shadow:inset 0 1px 1px rgba(255,255,255,.6),0 0 0 3px rgba(245,80,26,.2),0 0 18px rgba(245,80,26,.7)}}
  .lnk.pop{animation:pop .5s cubic-bezier(.2,1.5,.4,1) both}
  @keyframes pop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.22)}100%{transform:scale(1);opacity:1}}
  .sharebtn{margin-top:14px;width:100%;background:linear-gradient(120deg,#fff,#fff);border:1.5px solid #f2c99a;
    color:var(--accent);font-weight:850;font-size:14.5px;padding:14px;border-radius:13px;cursor:pointer;box-shadow:var(--shadow)}
  .sharebtn:active{transform:translateY(1px)}
  .milestone{margin-top:14px;text-align:left}
  .milestone .mt{display:flex;justify-content:space-between;font-size:11.5px;font-weight:800;color:var(--sub);margin-bottom:6px}
  .mbar{height:9px;background:#f0ece2;border-radius:99px;overflow:hidden}
  .mbar i{display:block;height:100%;border-radius:99px;transition:width .7s cubic-bezier(.2,.8,.2,1)}

  .sec-t{font-size:14px;font-weight:850;margin:0 2px 10px;display:flex;align-items:center;justify-content:space-between}
  .sec-t .r{color:var(--dim);font-size:12px;font-weight:700}

  .mrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
  .mrow:last-child{border:none}
  .mrow .av{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;font-size:16px;flex:none;background:var(--card2)}
  .mrow .nm{font-weight:750;font-size:14.5px;flex:none}
  .mrow .gd{font-size:10.5px;font-weight:800;color:var(--gold);background:rgba(255,201,77,.12);padding:2px 7px;border-radius:999px}
  .mrow .prog{flex:1;height:9px;background:var(--card2);border-radius:99px;overflow:hidden;margin:0 4px}
  .mrow .prog i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .mrow .prog i.done{background:linear-gradient(90deg,var(--ok),#5fe6c0)}
  .mrow .cnt{font-size:12.5px;font-weight:800;width:34px;text-align:right}
  .mrow .cnt.miss{color:var(--danger)}
  .mrow .cnt.done{color:var(--ok)}
  .mrow .live{font-size:11px;font-weight:800;color:var(--accent);background:rgba(255,90,31,.12);padding:3px 8px;border-radius:999px;animation:pl 1.6s infinite}
  @keyframes pl{50%{opacity:.5}}

  .chick{display:flex;align-items:center;gap:14px}
  .chick .big{font-size:40px}
  .chick .n{font-size:28px;font-weight:900;color:var(--chick)}
  .chick .d{color:var(--sub);font-size:12.5px}

  /* board feed */
  .feed .item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .feed .item:last-child{border:none}
  .feed .fic{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;font-size:19px;flex:none;background:var(--card2)}
  .feed .fic.cheer{background:rgba(255,201,77,.14)}
  .feed .fb{flex:1;min-width:0}
  .feed .fn{font-weight:800;font-size:14px}
  .feed .ft{color:var(--sub);font-size:13px;margin-top:2px}
  .feed .ftag{display:inline-block;font-size:11.5px;font-weight:800;color:var(--accent2);background:rgba(255,90,31,.1);padding:2px 8px;border-radius:999px;margin-right:5px}
  .feed .fago{color:var(--dim);font-size:11px;white-space:nowrap}
  .empty{color:var(--dim);font-size:13.5px;text-align:center;padding:24px 0}

  .codechip{display:inline-flex;align-items:center;gap:8px;background:var(--card2);border:1px dashed var(--line);
    border-radius:12px;padding:9px 14px;cursor:pointer;font-weight:850;letter-spacing:.12em;font-size:16px}
  .codechip small{font-size:11px;color:var(--dim);letter-spacing:0;font-weight:700}

  /* action bar */
  .actions{position:fixed;bottom:0;left:0;right:0;z-index:30;padding:12px 16px 20px;
    background:linear-gradient(to top,var(--bg) 62%,transparent)}
  .actions .wrap{padding:0 16px;display:flex;gap:10px}
  .actions button{flex:1;border:none;cursor:pointer;font-family:inherit;font-weight:850;font-size:15px;padding:15px;border-radius:14px}
  .a-start{background:var(--card);color:var(--txt);border:1px solid var(--line)}
  .a-check{background:linear-gradient(120deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 8px 22px rgba(255,90,31,.3)}
  .a-cheer{background:linear-gradient(120deg,var(--gold),#ffb43c);color:#241a00}

  /* modal */
  .modal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);display:none;align-items:flex-end}
  .modal.open{display:flex}
  .sheet{background:var(--bg);width:100%;max-width:var(--maxw);margin:0 auto;border-radius:22px 22px 0 0;
    max-height:92vh;overflow-y:auto;padding:8px 20px 32px;animation:up .28s cubic-bezier(.2,.9,.3,1)}
  @keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
  .grip{width:40px;height:5px;border-radius:99px;background:var(--line);margin:8px auto 8px}
  .sheet h2{font-size:20px;font-weight:900;margin:6px 0 2px}
  .sheet .desc{color:var(--sub);font-size:13px;margin-bottom:4px}
  .field{margin-top:18px}
  .field label{display:block;font-weight:800;font-size:14px;margin-bottom:9px}
  .field .opt{color:var(--dim);font-weight:600;font-size:12px}
  input,textarea{width:100%;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:14px;color:var(--txt);font-size:16px;font-family:inherit}
  input:focus,textarea:focus{outline:none;border-color:var(--accent)}
  textarea{min-height:60px;resize:vertical}
  .code-in{text-transform:uppercase;letter-spacing:.3em;font-weight:850;text-align:center;font-size:22px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{cursor:pointer}
  .chip input{position:absolute;opacity:0;pointer-events:none}
  .chip span{display:block;font-size:14px;font-weight:700;padding:10px 13px;border-radius:12px;background:var(--card);border:1.5px solid var(--line);color:var(--sub)}
  .chip input:checked + span{background:rgba(255,90,31,.12);border-color:var(--accent);color:var(--accent2)}
  .chip.big span{font-size:24px;padding:12px 16px}
  .submit{width:100%;background:linear-gradient(120deg,var(--accent),var(--accent2));color:#fff;font-weight:850;font-size:16px;padding:16px;border:none;border-radius:14px;cursor:pointer;margin-top:24px}
  .submit:disabled{opacity:.5}
  .ghost-btn{background:transparent;border:none;color:var(--dim);font-size:14px;margin-top:16px;cursor:pointer;width:100%}
  .done{text-align:center;padding:20px 0 6px}
  .done .ic{font-size:52px}
  .done h2{margin-top:10px}
  .done p{color:var(--sub);font-size:14px;margin-top:10px}
  .codebox{font-size:40px;font-weight:900;letter-spacing:.2em;color:var(--gold);margin:18px 0 6px}
  .timerbar{background:rgba(255,90,31,.1);border:1px solid rgba(255,90,31,.3);border-radius:12px;padding:12px;margin-top:14px;text-align:center;font-weight:800;color:var(--accent2)}

  /* ── 인증샷 ── */
  .photobtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:1.5px dashed #f2c99a;
    background:#fff8f0;color:var(--accent);font-weight:800;font-size:14px;padding:16px;border-radius:12px;cursor:pointer}
  .photoprev{position:relative;margin-top:10px;border-radius:14px;overflow:hidden;border:1px solid var(--line)}
  .photoprev img{width:100%;display:block;max-height:240px;object-fit:cover}
  .photoprev .rm{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;border:none;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer}
  .feed .fphoto{margin-top:8px;border-radius:12px;overflow:hidden;border:1px solid var(--line);cursor:pointer;max-width:240px}
  .feed .fphoto img{width:100%;display:block;max-height:220px;object-fit:cover}
  .gallery{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
  .gallery::-webkit-scrollbar{display:none}
  .gthumb{flex:none;width:86px;height:86px;border-radius:14px;overflow:hidden;border:1px solid var(--line);cursor:pointer;position:relative}
  .gthumb img{width:100%;height:100%;object-fit:cover}
  .gthumb .gn{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(0,0,0,.65));color:#fff;font-size:10px;font-weight:800;padding:10px 6px 4px}
  .lightbox{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;padding:18px}
  .lightbox.open{display:flex}
  .lightbox img{max-width:100%;max-height:84%;border-radius:14px}
  .lightbox .cap{position:absolute;bottom:26px;left:0;right:0;text-align:center;color:#fff;font-weight:800;font-size:14px;text-shadow:0 1px 4px rgba(0,0,0,.6)}
  .linkbox{width:100%;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:12px;
    color:var(--sub);font-size:13px;text-align:center;margin:4px 0 14px;font-family:inherit}
  .toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(16px);
    background:var(--txt);color:var(--bg);font-weight:850;font-size:14px;padding:12px 20px;border-radius:12px;
    opacity:0;transition:.25s;z-index:200;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="logo" onclick="goHome()"><span>⛓️</span> <b>쇠사슬</b></div>
    <div style="display:flex;align-items:center;gap:9px">
      <span class="mode" id="modeBadge">…</span>
      <button class="profbtn" id="profBtn" style="display:none" onclick="renderProfile()"></button>
    </div>
  </div>
</header>

<div class="wrap" id="app"></div>

<!-- 액션바 (크루 화면에서만) -->
<div class="actions" id="actions" style="display:none">
  <div class="wrap" id="actionsInner"></div>
</div>

<div class="toast" id="toast"></div>

<!-- 인증샷 전체보기 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" alt="인증샷">
  <div class="cap" id="lightboxCap"></div>
</div>

<!-- 크루 만들기 -->
<div class="modal" id="createModal">
  <div class="sheet">
    <div class="grip"></div>
    <form id="createForm">
      <h2>크루 만들기 ⛓️</h2>
      <p class="desc">아는 사람끼리 만드세요. 만들면 초대 코드가 나와요.</p>
      <div class="field"><label>크루 이름 <span class="opt">*</span></label>
        <input name="cname" required placeholder="예: 새벽 여섯시 클럽" autocomplete="off"></div>
      <div class="field"><label>주간 목표 <span class="opt">(1인당 · 주 몇 번 인증?)</span></label>
        <div class="chips" id="goalChips"></div></div>
      <p class="desc" id="createAs" style="margin-top:14px"></p>
      <button class="submit" type="submit" id="createBtn">크루 만들기</button>
      <button type="button" class="ghost-btn" data-close>닫기</button>
    </form>
    <div class="done" id="createDone" style="display:none">
      <div class="ic">⛓️</div>
      <h2>크루 완성!</h2>
      <p>이 코드를 친구들한테 보내세요.<br>코드로 들어오면 같은 사슬을 쌓아요.</p>
      <div class="codebox" id="newCode">----</div>
      <input class="linkbox" id="newLink" readonly onclick="this.select()">
      <button class="submit" id="copyInviteBtn">🔗 초대 링크 복사</button>
      <button type="button" class="btn ghost" id="shareCode" style="margin-top:10px">📩 공유하기 (카톡 등)</button>
      <button type="button" class="ghost-btn" id="enterNew">크루 입장하기</button>
    </div>
  </div>
</div>

<!-- 코드로 참여 -->
<div class="modal" id="joinModal">
  <div class="sheet">

<script src="config.js"></script>
<script src="db.js"></script>
<script>
/* ===================== 상수 ===================== */
const ACTS = [["헬스","🏋️"],["러닝","🏃"],["수영","🏊"],["홈트","🏠"],["요가","🧘"],["클라이밍","🧗"],["자전거","🚴"],["구기","⚽"],["기타","✨"]];
const ACT_EMOJI = Object.fromEntries(ACTS);
const PARTS = ["가슴","등","어깨","팔","하체","복근","유산소","전신"];   // 헬스 하위 부위
const PART_EMOJI = {"가슴":"🎽","등":"🔙","어깨":"🏔️","팔":"💪","하체":"🦵","복근":"🧊","유산소":"🏃","전신":"🔥"};
const MOODS = ["🔥 빡세게","💪 가볍게","😮‍💨 힘듦","😌 개운"];
const STICKERS = ["🔥","💪","👏","🫡","🙌","❤️"];
const WEEK_MS = 7*24*3600*1000;

/* ===================== 계정 / 멤버십 ===================== */
let ME = null;                   // 내 프로필 {id, nickname, avatar, bio}
let MEMS = [];                   // 내 멤버십 [{crewId, memberId, role, name, code, crewName}]
let MODE = "local";
let pendingInvite = null;        // ?code= 로 들어온 초대 코드 (로그인 후 처리)
const meKey = "sasl_me";         // 로컬 모드 멤버십 저장
const getMe  = () => { try { return JSON.parse(localStorage.getItem(meKey)||"[]"); } catch { return []; } };
const setMe  = a => localStorage.setItem(meKey, JSON.stringify(a));
function addMe(m){ const a=getMe().filter(x=>String(x.crewId)!==String(m.crewId)); a.unshift(m); setMe(a); }
const myMember = cid => MEMS.find(x=>String(x.crewId)===String(cid));
// 로그인 없음 → 내 크루 목록은 이 기기(localStorage)에 저장
async function loadMemberships(){ MEMS = ME ? getMe() : []; }

let VIEW = null;                 // null=홈, 아니면 crewId
let cache = { crew:null, members:[], checkins:[] };
const prevChain = {};            // crewId -> 직전 렌더 고리 수 (성장 애니메이션용)

/* 등급: 사슬이 길어질수록 올라감 */
const TIERS=[
  {min:0,  emoji:"🔩", name:"무쇠사슬",   color:"#98a2b3"},
  {min:5,  emoji:"🥉", name:"구리사슬",   color:"#c9793c"},
  {min:12, emoji:"🔥", name:"불사슬",     color:"#f5501a"},
  {min:24, emoji:"⚡", name:"강철사슬",   color:"#e39a00"},
  {min:40, emoji:"💎", name:"다이아사슬", color:"#12b0b8"},
  {min:60, emoji:"🐋", name:"전설사슬",   color:"#6d5efc"},
];
function tierOf(n){ let cur=TIERS[0], next=null;
  for(let i=0;i<TIERS.length;i++){ if(n>=TIERS[i].min) cur=TIERS[i]; else { next=TIERS[i]; break; } }
  return {cur,next};
}
// 고리 HTML: 최근 popN개는 튕겨 붙는 애니메이션, 마지막 고리는 빛남(head)
function chainLinksHTML(n, popN){
  const cap=Math.min(n,120);
  let h="";
  for(let i=0;i<cap;i++){
    const head=i===cap-1;
    const pop=popN>0 && i>=cap-popN;
    const delay=pop?(i-(cap-popN))*70:0;
    h+=`<span class="lnk${head?' head':''}${pop?' pop':''}"${pop?` style="animation-delay:${delay}ms"`:''}></span>`;
  }
  return h;
}
function animateCount(id, from, to, ms){
  const el=document.getElementById(id); if(!el) return;
  if(from===to){ el.textContent=to; return; }
  const t0=performance.now();
  (function step(t){
    const p=Math.min(1,(t-t0)/ms), e=1-Math.pow(1-p,3); // easeOutCubic
    el.textContent=Math.round(from+(to-from)*e);
    if(p<1) requestAnimationFrame(step); else el.textContent=to;
  })(t0);
}

/* ===================== 유틸 ===================== */
const esc = s => (""+(s??"")).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function ago(iso){ const s=(Date.now()-new Date(iso).getTime())/1000;
  if(s<60)return"방금"; if(s<3600)return Math.floor(s/60)+"분 전"; if(s<86400)return Math.floor(s/3600)+"시간 전"; return Math.floor(s/86400)+"일 전"; }
const curWk = () => DB.weekStartTs(Date.now());
const weekCount = (cid,mid) => cache.checkins.filter(c=>String(c.member_id)===String(mid)&&(c.type||"workout")==="workout"&&DB.weekStartTs(c.created_at)===curWk()).length;
function activeWorkouts(){
  const res=[];
  for(const m of cache.members){
    if(m.role==="guardian") continue;
    const mine=cache.checkins.filter(c=>String(c.member_id)===String(m.id));
    const starts=mine.filter(c=>c.type==="start").sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    if(!starts.length) continue;
    const last=starts[0];
    const laterWorkout=mine.some(c=>c.type==="workout"&&new Date(c.created_at)>new Date(last.created_at));
    const el=Date.now()-new Date(last.created_at).getTime();
    if(!laterWorkout && el<3*3600*1000) res.push({m, mins:Math.floor(el/60000)});
  }
  return res;
}

/* ===================== 렌더 ===================== */
function render(){
  const badge=document.getElementById("modeBadge");
  if(VIEW && myMember(VIEW)) renderCrew(VIEW);
  else { VIEW=null; renderHome(); }
}

async function renderHome(){
  document.getElementById("actions").style.display="none";
  const mine=MEMS;
  let chains={};
  // 홈 카드용 고리 수(있으면 표시) — 가벼운 계산 위해 각 크루 최신값은 크루 진입 시 갱신됨
  let html="";
  if(mine.length){
    html += `<div style="padding:22px 0 6px"><h1>내 크루 ⛓️</h1><p class="lead">들어가서 오늘 인증하고 고리를 쌓으세요.</p></div>`;
    html += mine.map(m=>`
      <div class="crewitem" onclick="go('${m.crewId}')">
        <div class="ci-ic">⛓️</div>
        <div><div class="ci-n">${esc(m.crewName)}</div>
          <div class="ci-m">${m.role==="guardian"?"🙌 가디언":"🏋️ 크루원"} · 코드 ${esc(m.code)}</div></div>
        <div class="ci-chain"><b id="hc-${m.crewId}">–</b><span>고리</span></div>
      </div>`).join("");
    html += `<div style="margin-top:18px"></div>
      <button class="btn primary" onclick="openCreate()">＋ 새 크루 만들기</button>
      <button class="btn ghost" onclick="openJoin()">코드로 참여하기</button>`;
  } else {
    html = `
      <div style="padding:34px 0 8px">
        <h1>같이 운동하자는 약속,<br><span class="accent">이번엔 안 깨지게.</span></h1>
        <p class="lead">크루의 <b>쇠사슬</b>로 서로 끌고 가요. 한 명이 빠지면 사슬이 끊겨요.<br>인증 1번 = 고리 +1 ⛓️</p>
      </div>
      <div class="card">
        <div style="font-weight:800;font-size:15px;margin-bottom:4px">이렇게 돼요</div>
        <div style="color:var(--sub);font-size:13.5px;line-height:1.7">
          1️⃣ 아는 친구끼리 크루 생성 → 코드 공유<br>
          2️⃣ 매주 목표만큼 <b>10초 인증</b> (부위만 찍기)<br>
          3️⃣ 다 채우면 사슬이 자라고, 한 명이라도 빠지면 <b>절단</b> + 🍗치킨 적립<br>
          4️⃣ 운동 안 하는 친구는 <b>가디언</b>으로 응원 참여
        </div>
      </div>
      <div style="margin-top:18px"></div>
      <button class="btn primary" onclick="openCreate()">크루 만들기</button>
      <button class="btn ghost" onclick="openJoin()">코드로 참여하기</button>`;
  }
  document.getElementById("app").innerHTML=html;

  // 홈 카드 고리 수 채우기(비동기)
  for(const m of mine){
    try{
      const [crew,members,checkins]=await Promise.all([DB.getCrew(m.crewId),DB.getMembers(m.crewId),DB.getCheckins(m.crewId)]);
      if(crew){ const r=DB.computeChain(crew,members,checkins); const el=document.getElementById("hc-"+m.crewId); if(el) el.textContent=r.chain; }
    }catch(_){}
  }
}

async function renderCrew(cid){
  const mem=myMember(cid);
  let crew,members,checkins;
  try{ [crew,members,checkins]=await Promise.all([DB.getCrew(cid),DB.getMembers(cid),DB.getCheckins(cid)]); }
  catch(e){ document.getElementById("app").innerHTML=`<div class="empty" style="padding:60px">불러오기 실패: ${esc(e.message||e)}</div>`; return; }
  if(!crew){ // 삭제됐거나 로컬 전용 크루가 이 기기에 없음
    document.getElementById("app").innerHTML=`<div class="card" style="margin-top:24px"><div class="empty">이 크루를 찾을 수 없어요.<br>(다른 기기에서 만든 로컬 크루이거나 삭제됨)</div><button class="btn ghost" onclick="goHome()" style="margin-top:12px">홈으로</button></div>`;
    document.getElementById("actions").style.display="none"; return;
  }
  cache={crew,members,checkins};

  const workoutMembers=members.filter(m=>m.role!=="guardian");
  const guardians=members.filter(m=>m.role==="guardian");
  const r=DB.computeChain(crew,members,checkins);
  const goal=crew.goal;
  const active=activeWorkouts();
  const daysLeft=Math.max(0,Math.ceil((curWk()+WEEK_MS-Date.now())/86400000));

  // 이번 주 미달자
  const behind=workoutMembers.filter(m=>weekCount(cid,m.id)<goal);
  const meLive=active.find(a=>String(a.m.id)===String(mem.memberId));

  // 상태 메시지
  let status;
  if(behind.length===0 && workoutMembers.length>0) status=`<div class="status safe">🔥 이번 주 전원 목표 달성! 사슬이 이어지고 있어요</div>`;
  else status=`<div class="status risk">⚠️ 이번 주 미달 ${behind.length}명 · 남은 ${daysLeft}일 · 한 명이라도 못 채우면 사슬 끊김</div>`;

  // 쌓이는 쇠사슬 (등급·마일스톤·성장 애니메이션)
  const {cur,next}=tierOf(r.chain);
  const firstOpen = prevChain[cid]===undefined;
  const grew = !firstOpen && r.chain>prevChain[cid];
  const popN = grew ? Math.min(r.chain-prevChain[cid], 12) : 0;
  const animStart = firstOpen ? 0 : (grew ? prevChain[cid] : r.chain);
  const linksHTML = r.chain>0 ? chainLinksHTML(r.chain, popN)
    : `<div class="chainempty">첫 인증으로 첫 고리를 채워보세요 ⛓️</div>`;
  const mpct = next ? Math.round((r.chain-cur.min)/(next.min-cur.min)*100) : 100;
  const milestone = next
    ? `<div class="milestone"><div class="mt"><span>다음 등급 ${next.emoji} ${next.name}</span><span><b style="color:${cur.color}">${next.min-r.chain}고리</b> 남음</span></div>
        <div class="mbar"><i style="width:${mpct}%;background:linear-gradient(90deg,${cur.color},${next.color})"></i></div></div>`
    : `<div class="milestone"><div class="mt"><span>🐋 최고 등급 달성!</span><span>${r.chain}고리</span></div></div>`;

  let html=`
    <div style="padding:16px 0 6px;display:flex;align-items:center;justify-content:space-between;gap:10px">
      <div><div style="font-size:20px;font-weight:900">${esc(crew.name)}</div>
        <div style="color:var(--sub);font-size:12.5px">주 ${goal}회 목표 · 크루원 ${workoutMembers.length}${guardians.length?` · 가디언 ${guardians.length}`:""}</div></div>
      <div class="codechip" onclick="copyInvite('${esc(crew.code)}','${esc(crew.name)}')">${esc(crew.code)}<small>탭해서 링크 복사</small></div>
    </div>

    <div class="chainhero">
      <span class="burst" id="chBurst"></span>
      <div class="tier" style="color:${cur.color}">${cur.emoji} ${cur.name}</div>
      <div class="chainbig" id="chainBig"><span id="chainNum">${animStart}</span><span class="u"> 고리</span></div>
      <div class="chainwrap">${linksHTML}</div>
      <div class="chainmeta">
        <div>최고 기록 <b>${r.best}고리</b></div>
        <div>🍗 치킨 <b>${r.chicken}</b></div>
      </div>
      ${milestone}
      ${status}
      <button class="sharebtn" onclick="shareCurrentCrew()">📸 스토리에 우리 사슬 자랑하기</button>
    </div>

    <div class="card">
      <div class="sec-t">이번 주 진행 <span class="r">${new Date(curWk()).toLocaleDateString("ko-KR",{month:"numeric",day:"numeric"})} ~ · 남은 ${daysLeft}일</span></div>
      ${workoutMembers.map(m=>{
        const c=weekCount(cid,m.id); const pct=Math.min(100,c/goal*100); const done=c>=goal;
        const liv=active.find(a=>String(a.m.id)===String(m.id));
        return `<div class="mrow">
          <div class="av">${done?"✅":"🏋️"}</div>
          <div class="nm">${esc(m.name)}${String(m.id)===String(mem.memberId)?" <span style='color:var(--dim);font-weight:600'>(나)</span>":""}</div>
          ${liv?`<span class="live">운동 중 ${liv.mins}분</span>`:""}
          <div class="prog"><i class="${done?"done":""}" style="width:${pct}%"></i></div>
          <div class="cnt ${done?"done":"miss"}">${c}/${goal}</div>
        </div>`;
      }).join("")}
      ${guardians.length?`<div style="margin-top:10px;color:var(--dim);font-size:12px">🙌 가디언: ${guardians.map(g=>esc(g.name)).join(", ")}</div>`:""}
    </div>

    <div class="card">
      <div class="chick">
        <div class="big">🍗</div>
        <div><div class="n">${r.chicken}마리</div>
          <div class="d">미달마다 치킨 1마리 적립. 시즌 끝나면 다 같이 먹어요(빠진 사람이 쏘기 👀)</div></div>
      </div>
    </div>

    ${(()=>{ const ph=checkins.filter(c=>(c.type||"workout")==="workout"&&c.photo).slice(0,15);
      return ph.length ? `<div class="card">
        <div class="sec-t">📸 우리 크루 인증샷 <span class="r">${ph.length}장</span></div>
        <div class="gallery">${ph.map(c=>`<div class="gthumb" onclick="openLightbox('${c.id}')"><img src="${c.photo}" loading="lazy"><div class="gn">${esc(c.name)}</div></div>`).join("")}</div>
      </div>` : ""; })()}

    <div class="card">
      <div class="sec-t">크루 보드 <span class="r">최근 인증·응원</span></div>
      <div class="feed">
        ${checkins.filter(c=>c.type!=="start").slice(0,20).map(c=>{
          if(c.type==="cheer") return `<div class="item">
            <div class="fic cheer">${esc(c.part||"🙌")}</div>
            <div class="fb"><div class="fn">${esc(c.name)} <span style="color:var(--gold);font-size:11px;font-weight:800">가디언</span></div>
              <div class="ft">${esc(c.note||"응원을 보냈어요")}</div></div>
            <div class="fago">${ago(c.created_at)}</div></div>`;
          const act=c.part||"";
          return `<div class="item">
            <div class="fic">${ACT_EMOJI[act]||"⛓️"}</div>
            <div class="fb"><div class="fn">${esc(c.name)} <span style="color:var(--ok);font-size:11px;font-weight:800">인증 ⛓️</span></div>
              <div class="ft">${act?`<span class="ftag">${esc(act)}</span>`:""}${esc(c.note||"")}</div>
              ${c.photo?`<div class="fphoto" onclick="openLightbox('${c.id}')"><img src="${c.photo}" loading="lazy" alt="인증샷"></div>`:""}</div>
            <div class="fago">${ago(c.created_at)}</div></div>`;
        }).join("") || `<div class="empty">아직 인증이 없어요. 첫 고리를 채워보세요!</div>`}
      </div>
    </div>
  `;
  document.getElementById("app").innerHTML=html;

  // 성장 애니메이션 (카운트업 + 숫자 튕김 + 증가량 버스트)

async function copyText(t){
  try{ await navigator.clipboard.writeText(t); return true; }
  catch(_){
    try{ const ta=document.createElement("textarea"); ta.value=t; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.focus(); ta.select(); const ok=document.execCommand("copy"); document.body.removeChild(ta); return ok; }
    catch(e){ return false; }
  }
}

// 캔버스로 리사이즈·JPEG 압축 → data URL (별도 저장소 없이 DB에 저장)
function downscaleImage(file, maxDim, quality){
  return new Promise((res,rej)=>{
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{ let w=img.naturalWidth,h=img.naturalHeight; const s=Math.min(1,maxDim/Math.max(w,h));
      w=Math.round(w*s); h=Math.round(h*s);
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h); URL.revokeObjectURL(url);
      try{ res(cv.toDataURL("image/jpeg",quality)); }catch(e){ rej(e); } };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error("이미지를 읽을 수 없어요")); };
    img.src=url;
  });
}

/* ===================== 공유 카드 (스토리 규격 1080×1920) ===================== */
const FONT='-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif';
function loadImg(src){ return new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=()=>rej(new Error("img")); i.src=src; }); }
function roundRect(g,x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }
function drawLinks(g,cx,y,n){
  const lw=46,lh=23,gap=-11,total=n*(lw+gap)-gap; let x=cx-total/2;
  for(let i=0;i<n;i++){ const gr=g.createLinearGradient(x,y-lh/2,x,y+lh/2); gr.addColorStop(0,"#ffe6a8"); gr.addColorStop(1,"#d98a00");
    g.fillStyle=gr; roundRect(g,x,y-lh/2,lw,lh,11); g.fill(); g.strokeStyle="rgba(170,110,0,.4)"; g.lineWidth=2; g.stroke(); x+=lw+gap; }
}
async function drawCollage(g,photos,x,y,w,h){
  if(!photos.length){ g.textAlign="center"; g.fillStyle="#dfe3ea"; g.font=`220px ${FONT}`; g.fillText("⛓️",x+w/2,y+h/2+70); return; }
  const imgs=(await Promise.all(photos.map(p=>loadImg(p).catch(()=>null)))).filter(Boolean);
  const n=Math.min(imgs.length,4), gap=16; let cells;
  const cw2=(w-gap)/2, ch2=(h-gap)/2;
  if(n===1) cells=[[x,y,w,h]];
  else if(n===2) cells=[[x,y,cw2,h],[x+cw2+gap,y,cw2,h]];
  else if(n===3) cells=[[x,y,cw2,h],[x+cw2+gap,y,cw2,ch2],[x+cw2+gap,y+ch2+gap,cw2,ch2]];
  else cells=[[x,y,cw2,ch2],[x+cw2+gap,y,cw2,ch2],[x,y+ch2+gap,cw2,ch2],[x+cw2+gap,y+ch2+gap,cw2,ch2]];
  imgs.slice(0,n).forEach((img,i)=>{
    const [cx,cy,cw,ch]=cells[i]; g.save(); roundRect(g,cx,cy,cw,ch,28); g.clip();
    const ar=img.width/img.height, car=cw/ch; let dw,dh,dx,dy;
    if(ar>car){ dh=ch; dw=ch*ar; dx=cx-(dw-cw)/2; dy=cy; } else { dw=cw; dh=cw/ar; dx=cx; dy=cy-(dh-ch)/2; }
    g.drawImage(img,dx,dy,dw,dh); g.restore();
    g.strokeStyle="rgba(0,0,0,.06)"; g.lineWidth=2; roundRect(g,cx,cy,cw,ch,28); g.stroke();
  });
}
async function drawCardBlob({crewName,chain,tier,best,photos}){
  const W=1080,H=1920, cv=document.createElement("canvas"); cv.width=W; cv.height=H; const g=cv.getContext("2d");
  const bg=g.createLinearGradient(0,0,0,H); bg.addColorStop(0,"#fff2da"); bg.addColorStop(.5,"#fff9f0"); bg.addColorStop(1,"#ffffff");
  g.fillStyle=bg; g.fillRect(0,0,W,H);
  g.textAlign="center";
  g.fillStyle="#f5501a"; g.font=`800 46px ${FONT}`; g.fillText("⛓️ 쇠사슬",W/2,150);
  g.fillStyle="#1a1d23"; g.font=`900 62px ${FONT}`; g.fillText(crewName.length>14?crewName.slice(0,14)+"…":crewName,W/2,244);
  g.fillStyle=tier.color; g.font=`800 42px ${FONT}`; g.fillText(`${tier.emoji} ${tier.name}`,W/2,320);
  const ng=g.createLinearGradient(0,400,0,760); ng.addColorStop(0,"#ffc94d"); ng.addColorStop(1,"#ff7a42");
  g.fillStyle=ng; g.font=`900 340px ${FONT}`; g.textBaseline="middle"; g.fillText(String(chain),W/2,600); g.textBaseline="alphabetic";
  g.fillStyle="#667085"; g.font=`800 66px ${FONT}`; g.fillText("고리",W/2,825);
  drawLinks(g,W/2,905,Math.min(Math.max(chain,1),16));
  g.fillStyle="#98a2b3"; g.font=`600 38px ${FONT}`; g.fillText(`최고 기록 ${best}고리`,W/2,985);
  await drawCollage(g,photos,90,1055,W-180,600);
  g.fillStyle="#667085"; g.font=`700 40px ${FONT}`; g.fillText("매일 같이 쌓는 운동 사슬",W/2,1770);
  g.fillStyle="#f5501a"; g.font=`800 42px ${FONT}`; g.fillText("soesaseul.github.io",W/2,1832);
  return await new Promise(res=>cv.toBlob(res,"image/png",.92));
}
async function shareCurrentCrew(){
  if(!cache.crew){ return; }
  const r=DB.computeChain(cache.crew,cache.members,cache.checkins);
  const {cur}=tierOf(r.chain);
  const photos=cache.checkins.filter(c=>(c.type||"workout")==="workout"&&c.photo).slice(0,4).map(c=>c.photo);

  pendingAvatar = editingProfile && ME ? (ME.avatar||"") : "";
  const nick = editingProfile && ME ? ME.nickname : "";
  const bio = editingProfile && ME ? (ME.bio||"") : "";
  document.getElementById("app").innerHTML=`
    <div style="padding:26px 0 6px;text-align:center">
      <div style="font-size:38px">${editingProfile?"✏️":"🙌"}</div>
      <h1 style="margin-top:8px">${editingProfile?"프로필 수정":"프로필 만들기"}</h1>
      <p class="lead">크루원들에게 보일 프로필이에요.</p>
    </div>
    <div class="card" style="text-align:center">
      <div class="avataredit" id="avatarPrev" onclick="document.getElementById('avatarInput').click()">${pendingAvatar?`<img src="${pendingAvatar}">`:"＋<br><small>사진</small>"}</div>
      <input type="file" id="avatarInput" accept="image/*" hidden>
      <div class="field" style="text-align:left"><label>닉네임 <span class="opt">*</span></label><input id="pfNick" maxlength="12" placeholder="예: 민준" value="${esc(nick)}"></div>
      <div class="field" style="text-align:left"><label>한줄 소개 <span class="opt">(선택)</span></label><input id="pfBio" maxlength="40" placeholder="예: 3대 400 목표 / 새벽러" value="${esc(bio)}"></div>
      <button class="btn primary" style="margin-top:18px" id="pfSaveBtn" onclick="saveProfile()">${editingProfile?"저장":"시작하기"}</button>
      <p id="pfMsg" style="color:var(--danger);font-size:13px;margin-top:8px"></p>
    </div>`;
  document.getElementById("avatarInput").onchange=async e=>{
    const f=e.target.files&&e.target.files[0]; if(!f) return;
    try{ pendingAvatar=await downscaleImage(f,256,0.7);
      document.getElementById("avatarPrev").innerHTML=`<img src="${pendingAvatar}">`;
    }catch(_){ alert("사진 처리 실패"); }
  };
}
async function saveProfile(){
  const nick=document.getElementById("pfNick").value.trim();
  if(!nick){ document.getElementById("pfMsg").textContent="닉네임을 입력하세요"; return; }
  const btn=document.getElementById("pfSaveBtn"); btn.disabled=true; btn.textContent="저장 중…";
  try{
    const p=await DB.upsertProfile({nickname:nick, avatar:pendingAvatar, bio:document.getElementById("pfBio").value.trim()});
    ME=p;
    if(editingProfile){ editingProfile=false; showProfBtn(); renderProfile(); }
    else { await afterLogin(); }
  }catch(err){ document.getElementById("pfMsg").textContent=(err.message||err); btn.disabled=false; btn.textContent="저장"; }
}

/* ===================== 내 프로필 화면 ===================== */
async function renderProfile(){
  document.getElementById("actions").style.display="none";
  document.getElementById("app").innerHTML=`<div class="empty" style="padding:50px">불러오는 중…</div>`;
  let totalCk=0, totalPhoto=0, bestChain=0;
  for(const mem of MEMS){
    try{
      const [crew,members,checkins]=await Promise.all([DB.getCrew(mem.crewId),DB.getMembers(mem.crewId),DB.getCheckins(mem.crewId)]);
      const mine=checkins.filter(c=>String(c.member_id)===String(mem.memberId));
      totalCk+=mine.filter(c=>(c.type||"workout")==="workout").length;
      totalPhoto+=mine.filter(c=>c.photo).length;
      if(crew){ const r=DB.computeChain(crew,members,checkins); bestChain=Math.max(bestChain,r.chain); }
    }catch(_){}
  }
  const {cur}=tierOf(bestChain);
  document.getElementById("app").innerHTML=`
    <div style="padding:16px 0 4px"><button class="linkback" onclick="render()">← 뒤로</button></div>
    <div class="card" style="text-align:center">
      <div class="avatarbig">${ME.avatar?`<img src="${ME.avatar}">`:esc((ME.nickname||"?").slice(0,1))}</div>
      <div style="font-size:22px;font-weight:900;margin-top:12px">${esc(ME.nickname)}</div>
      ${ME.bio?`<div style="color:var(--sub);font-size:14px;margin-top:4px">${esc(ME.bio)}</div>`:""}
      <div class="tier" style="color:${cur.color};margin-top:12px">${cur.emoji} ${cur.name}</div>
    </div>
    <div class="statgrid">
      <div class="statc"><b>${MEMS.length}</b><span>크루</span></div>
      <div class="statc"><b>${totalCk}</b><span>총 인증</span></div>
      <div class="statc"><b>${bestChain}</b><span>최고 고리</span></div>
      <div class="statc"><b>${totalPhoto}</b><span>인증샷</span></div>
    </div>
    <button class="btn ghost" style="margin-top:16px" onclick="openEditProfile()">프로필 수정</button>
    <button class="btn ghost" style="margin-top:10px;color:var(--danger)" onclick="doLogout()">이 기기에서 초기화</button>`;
}
function openEditProfile(){ editingProfile=true; renderProfileSetup(); }
async function doLogout(){
  if(!confirm("이 기기에서 프로필과 크루 목록을 초기화할까요?\n(크루 자체는 안 지워지고, 코드로 다시 들어올 수 있어요)")) return;
  localStorage.removeItem("sasl_profile_local"); localStorage.removeItem("sasl_me"); localStorage.removeItem("sasl_current");
  ME=null; MEMS=[]; VIEW=null; hideProfBtn(); await bootstrap();
}

/* ===================== 초기화 / 인증 게이트 ===================== */
async function afterLogin(){
  showProfBtn();
  await loadMemberships();
  const cur=localStorage.getItem("sasl_current");
  VIEW = (cur && MEMS.some(x=>String(x.crewId)===String(cur))) ? cur : null;
  render();
  if(pendingInvite && !MEMS.some(x=>x.code===pendingInvite)){ openJoin(pendingInvite); }
  pendingInvite=null;
}
async function bootstrap(){
  // 로그인 없음: 이 기기에 닉네임(프로필)만 있으면 바로 시작
  const profile=await DB.getProfile();
  if(!profile || !profile.nickname){ ME=null; renderProfileSetup(); return; }
  ME=profile;
  await afterLogin();
}
(async function init(){
  MODE=await DB.mode(); const b=document.getElementById("modeBadge");
  if(MODE==="supabase"){ b.textContent="● 실시간"; b.classList.add("live"); } else b.textContent="로컬";
  const code=new URLSearchParams(location.search).get("code");
  pendingInvite = code ? code.toUpperCase() : null;
  await bootstrap();
  setInterval(()=>{ if(VIEW && ME && !document.querySelector(".modal.open")) renderCrew(VIEW); }, 25000);
})();
</script>
</body>
</html>
