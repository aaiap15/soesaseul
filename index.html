<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0d0d10" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="폼클럽" />
<title>폼클럽 · 우리 팀이 구단이 되는 곳</title>
<meta name="description" content="친구 크루랑 같이 키우는 운동 마스코트. 인증하면 벌크업, 방치하면 시들." />
<meta property="og:title" content="폼클럽 · 같이 키우는 운동 마스코트" />
<meta property="og:description" content="크루로 쌓는 운동 역사. 인증하면 마스코트가 자란다." />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<style>
  :root{
    /* 다크 애슬레틱: 블랙 베이스 + 강렬한 레드 + 거대 Anton 숫자 */
    --bg:#0d0d10; --card:#17171c; --card2:#212127; --line:#2c2c34; --ink:#f4f4f6;
    --txt:#f4f4f6; --sub:#9a9aa4; --dim:#66666f;
    --accent:#e5352b; --accent2:#e5352b; --blue:#3b82f6; --ok:#22c55e; --gold:#d4af37; --chick:#f59e0b; --danger:#e5352b;
    --radius:12px; --maxw:500px;
    --shadow:0 2px 10px rgba(0,0,0,.35);
    --font-num:"Anton",-apple-system,BlinkMacSystemFont,sans-serif;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--txt);line-height:1.5;padding-bottom:110px}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 16px}
  a{color:inherit}

  header{position:sticky;top:0;z-index:20;background:rgba(13,13,16,.85);backdrop-filter:blur(10px);
    padding:14px 0 12px;border-bottom:1px solid var(--line)}
  header .wrap{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .logo{font-size:20px;font-weight:900;letter-spacing:-.02em;cursor:pointer;display:flex;align-items:center;gap:6px}
  .logo b{color:var(--txt)}
  .mode{font-size:11px;font-weight:800;padding:4px 9px;border-radius:999px;background:var(--card);border:1px solid var(--line);color:var(--dim)}
  .mode.live{color:var(--ok);border-color:rgba(53,208,165,.4)}

  h1{font-size:26px;font-weight:900;letter-spacing:-.03em;line-height:1.28;word-break:keep-all}
  .lead{color:var(--sub);font-size:15px;margin-top:12px}
  .accent{color:var(--accent)}

  .btn{display:block;width:100%;text-align:center;border:none;cursor:pointer;font-family:inherit;
    font-weight:850;font-size:16px;padding:16px;border-radius:14px}
  .btn.primary{background:var(--accent);color:#fff}
  .btn.ghost{background:var(--card);color:var(--txt);border:1px solid var(--line)}
  .btn:active{transform:translateY(1px)}
  .btn + .btn{margin-top:10px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
  .card + .card{margin-top:12px}
  .how{display:flex;flex-direction:column;gap:15px}
  .hs{display:flex;align-items:center;gap:13px;font-size:15px;font-weight:600}
  .he{width:40px;height:40px;border-radius:12px;background:var(--card2);display:grid;place-items:center;font-size:20px;flex:none}

  .charcard{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:18px 18px 16px;text-align:center;box-shadow:var(--shadow);margin-bottom:12px}
  .charbox{width:168px;height:168px;margin:0 auto}
  .charbox svg{width:100%;height:100%;display:block;animation:breathe 3.4s ease-in-out infinite;transform-origin:center bottom}
  @keyframes breathe{50%{transform:translateY(-5px) scale(1.02)}}
  .charname{font-weight:900;font-size:18px;margin-top:4px}
  .charname .lv{color:var(--sub);font-size:13px;font-weight:800}
  .charcond{font-weight:850;font-size:14px;margin-top:2px}
  /* 피파식 선수 카드 */
  .playercard{padding:16px}
  .pc-top{display:flex;align-items:flex-start;justify-content:space-between}
  .pc-ovr{display:flex;flex-direction:column;align-items:center;line-height:.85}
  .pc-ovr b{font-family:var(--font-num);font-weight:400;font-size:44px;color:var(--txt)}
  .pc-ovr span{font-size:10px;font-weight:800;letter-spacing:.18em;color:var(--sub);margin-top:3px}
  .pc-cond{font-family:var(--font-num);font-weight:400;font-size:16px;letter-spacing:.02em;padding-top:6px}
  .playercard .charbox{width:190px;height:auto;margin:2px auto 4px}
  .playercard .charbox svg{width:100%;height:auto}
  .pc-name{text-align:center;font-weight:900;font-size:20px}
  .pc-name .pc-sub{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-top:2px}
  .charnudge{margin-top:12px;background:var(--card2);color:var(--sub);font-weight:800;font-size:12.5px;padding:10px;border-radius:12px}
  .charnudge.good{background:rgba(18,184,134,.1);color:var(--ok)}
  .mrow2{padding:12px 0;border-bottom:1px solid var(--line)}
  .mrow2:last-child{border:none}
  .mrow2-top{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .mrow2-top .nm{font-weight:750;font-size:14.5px}
  .jno{font-family:var(--font-num);font-weight:400;font-size:16px;color:var(--sub);min-width:22px;display:inline-block;text-align:center;letter-spacing:.02em}
  .mrow2-top .jno{color:var(--txt);font-size:18px;margin-right:2px}
  .mrow2-top .cnt{margin-left:auto;font-size:12.5px;font-weight:800}
  .mrow2-top .cnt.done{color:var(--ok)} .mrow2-top .cnt.miss{color:var(--sub)}
  .wkstrip{display:flex;gap:6px}
  .wd{flex:1;height:28px;border-radius:8px;border:1.5px solid var(--line);display:grid;place-items:center;font-size:11px;font-weight:800;color:var(--dim)}
  .wd.on{background:var(--ok);border-color:var(--ok);color:#fff}
  .wd.today{border-color:var(--ink)}
  .iconbtn{width:38px;height:38px;border-radius:12px;border:1px solid var(--line);background:var(--card);font-size:17px;cursor:pointer;box-shadow:var(--shadow)}
  .teambadge{font-size:12px;font-weight:800;color:var(--gold);background:rgba(227,154,0,.12);padding:2px 8px;border-radius:999px;vertical-align:middle}
  .penaltycard{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.35);border-radius:12px;padding:13px 16px;font-size:13px;font-weight:700;color:#f0b03e;box-shadow:var(--shadow)}
  .penaltycard b{color:#ffcf7a}
  /* ── 구단 UI ── */
  .clubhead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px;border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:12px;margin:8px 0 12px;background:var(--card)}
  .clubhead .ch-l{display:flex;align-items:center;gap:12px;min-width:0}
  .ch-emblem{width:46px;height:46px;border-radius:10px;display:grid;place-items:center;font-size:22px;font-weight:900;color:#fff;flex:none}
  .ch-name{font-size:19px;font-weight:900;letter-spacing:-.02em}
  .ch-mw{font-family:var(--font-num);font-size:13px;color:var(--sub);letter-spacing:.06em;margin-top:2px}
  .ch-r{display:flex;align-items:center;gap:8px;flex:none}
  .formcard{position:relative;background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:20px 18px;text-align:center;margin-bottom:12px}
  .fc-chant{font-size:12.5px;color:var(--sub);font-weight:700;margin-bottom:8px}
  .fc-form{font-family:var(--font-num);font-size:34px;letter-spacing:.02em}
  .fc-ovr{display:flex;align-items:baseline;justify-content:center;gap:8px;margin-top:6px}
  .fc-ovr b{font-family:var(--font-num);font-weight:400;font-size:64px;line-height:1;color:var(--txt)}
  .fc-ovr span{font-size:12px;font-weight:800;letter-spacing:.2em;color:var(--sub)}
  .fc-total{margin-top:8px;font-size:14px;font-weight:700;color:var(--sub)}
  .fc-total b{font-family:var(--font-num);font-weight:400;font-size:26px;color:var(--txt);vertical-align:-2px;margin:0 2px}
  .fc-nudge{margin-top:12px;background:var(--card2);color:var(--sub);font-weight:700;font-size:12px;padding:10px;border-radius:10px}
  .fc-nudge.good{color:var(--ok)}
  .fc-week{display:flex;flex-direction:column;gap:8px;margin-top:14px;border-top:1px solid var(--line);padding-top:14px}
  .fc-week>span{font-size:12.5px;font-weight:700;color:var(--sub)}
  .fc-week b{color:var(--txt)}
  .totrow{display:flex;justify-content:space-between;align-items:baseline;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px;font-weight:700;color:var(--sub)}
  .totrow:last-child{border:none}
  .totrow b{font-family:var(--font-num);font-weight:400;font-size:24px;color:var(--txt)}
  .tabbtn{flex:1;background:transparent;border:none;color:var(--dim);font-weight:800;font-size:12.5px;padding:12px 4px;cursor:pointer;border-top:2px solid transparent}
  .tabbtn.on{color:var(--txt);border-top-color:var(--accent)}
  .teambanner{display:flex;align-items:center;gap:14px;border-radius:14px;padding:16px 18px;margin-bottom:12px;color:#fff}
  .teambanner .tb-emblem{font-size:34px;line-height:1}
  .teambanner .tb-name{font-weight:900;font-size:19px;letter-spacing:-.02em}
  .teambanner .tb-chant{font-size:12.5px;opacity:.85;margin-top:2px}
  .colorchip input{position:absolute;opacity:0}
  .colorchip span{display:block;width:34px;height:34px;border-radius:50%;padding:0;border:2px solid transparent}
  .colorchip input:checked + span{border-color:var(--ink);box-shadow:0 0 0 2px #fff inset}
  .rankgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .rankttl{font-size:12.5px;font-weight:800;color:var(--sub);margin-bottom:8px}
  .rankrow{display:flex;align-items:center;gap:8px;padding:5px 0}
  .rankrow .rk{width:20px;height:20px;border-radius:6px;background:var(--card2);display:grid;place-items:center;font-size:11px;font-weight:900;flex:none}
  .rankrow .rk.rk1{background:var(--ok);color:#fff}
  .rankrow .rn{font-weight:700;font-size:13.5px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rankrow .rv{font-weight:800;font-size:13px;font-family:var(--font-num)}
  .myrank{margin-top:8px;font-size:11.5px;font-weight:800;color:var(--sub);border-top:1px solid var(--line);padding-top:8px}
  .feedhi{background:var(--card2);border-radius:10px;padding:10px 12px;font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:10px}
  .resetrow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px;font-weight:700}
  .resetrow:last-child{border:none}
  .minibtn{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:800;cursor:pointer}

  /* home crew list */
  .crewitem{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:16px;margin-top:10px;cursor:pointer;box-shadow:var(--shadow)}
  .crewitem:active{transform:scale(.99)}
  .crewitem .ci-ic{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-size:22px;flex:none;
    background:var(--card2)}
  .crewitem .ci-n{font-weight:850;font-size:16px}
  .crewitem .ci-m{color:var(--sub);font-size:13px;margin-top:2px}
  .crewitem .ci-chain{margin-left:auto;text-align:right}
  .crewitem .ci-chain b{font-size:20px;font-weight:900;color:var(--gold)}
  .crewitem .ci-chain span{display:block;font-size:11px;color:var(--dim)}

  /* ── 계정/프로필 ── */
  .profbtn{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:var(--card);overflow:hidden;
    cursor:pointer;padding:0;display:grid;place-items:center;font-weight:900;color:var(--accent);box-shadow:var(--shadow)}
  .profbtn img{width:100%;height:100%;object-fit:cover}
  .segbtns{display:flex;background:var(--card2);border-radius:12px;padding:4px;margin-bottom:4px}
  .segb{flex:1;border:none;background:transparent;font-weight:800;font-size:14px;padding:11px;border-radius:9px;cursor:pointer;color:var(--sub)}
  .segb.on{background:#fff;color:var(--txt);box-shadow:var(--shadow)}
  .avataredit{width:96px;height:96px;border-radius:50%;border:2px dashed #f2c99a;background:#fff8f0;color:var(--accent);
    display:grid;place-items:center;font-weight:900;font-size:18px;margin:4px auto;cursor:pointer;overflow:hidden;line-height:1.15}
  .avataredit img{width:100%;height:100%;object-fit:cover}
  .avataredit small{font-size:11px;font-weight:700}
  .avatarbig{width:92px;height:92px;border-radius:50%;margin:0 auto;display:grid;place-items:center;overflow:hidden;
    font-size:38px;font-weight:900;color:#fff;background:var(--accent)}
  .avatarbig img{width:100%;height:100%;object-fit:cover}
  .statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
  .statc{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 6px;text-align:center;box-shadow:var(--shadow)}
  .statc b{display:block;font-size:22px;font-weight:900;color:var(--accent)}
  .statc span{font-size:11px;color:var(--sub);font-weight:700}
  .linkback{background:transparent;border:none;color:var(--sub);font-weight:800;font-size:15px;cursor:pointer;padding:0}

  /* chain hero */
  .chainhero{background:var(--card);border:1.5px solid var(--ink);
    border-radius:16px;padding:22px 20px;text-align:center;position:relative;overflow:hidden;
    box-shadow:none}
  .chainhero .lbl{color:var(--sub);font-size:13px;font-weight:700}
  .chainbig{font-size:76px;font-weight:900;letter-spacing:-.01em;line-height:1;margin:8px 0 2px;
    color:var(--ink);font-family:var(--font-num);font-weight:400;letter-spacing:0}
  .chainbig .u{font-size:24px;color:var(--sub);-webkit-text-fill-color:var(--sub)}
  .links{font-size:19px;letter-spacing:1px;margin:10px 0 4px;word-break:break-all;line-height:1.4}
  .chainmeta{display:flex;justify-content:center;gap:18px;margin-top:12px;flex-wrap:wrap}
  .chainmeta div{font-size:12.5px;color:var(--sub)}
  .chainmeta b{color:var(--txt);font-weight:800}
  .status{margin-top:14px;font-size:13.5px;font-weight:800;padding:10px;border-radius:12px}
  .status.safe{background:rgba(18,184,134,.12);color:var(--ok)}
  .status.risk{background:rgba(240,68,56,.1);color:var(--danger)}

  /* ── 쌓이는 폼클럽 ── */
  .tier{display:inline-flex;align-items:center;gap:6px;font-weight:850;font-size:13px;
    background:#fff;border:1px solid var(--line);padding:5px 13px;border-radius:999px;box-shadow:var(--shadow)}
  .chainbig{cursor:default}
  .chainbig.bump{animation:bump .55s cubic-bezier(.2,1.5,.4,1)}
  @keyframes bump{30%{transform:scale(1.14)}60%{transform:scale(.97)}100%{transform:scale(1)}}
  .burst{position:absolute;top:78px;left:50%;transform:translateX(-50%);font-weight:900;color:var(--accent);
    font-size:18px;opacity:0;pointer-events:none;z-index:2;text-shadow:0 2px 8px rgba(22,22,22,.35)}
  .burst.go{animation:burst 1.1s ease forwards}
  @keyframes burst{0%{opacity:0;transform:translate(-50%,10px) scale(.7)}22%{opacity:1}100%{opacity:0;transform:translate(-50%,-30px) scale(1.15)}}
  .chainwrap{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;margin:16px auto 4px;max-width:290px;min-height:16px}
  .chainempty{color:var(--dim);font-size:13px;margin:16px 0 4px}
  .lnk{width:24px;height:12px;border-radius:7px;margin:2.5px -6px;flex:none;
    background:#c6c6bc;
    border:1px solid rgba(170,110,0,.35);
    box-shadow:inset 0 1px 1px rgba(255,255,255,.75),inset 0 -1px 1px rgba(150,90,0,.28),0 1px 1px rgba(150,90,0,.15)}
  .lnk.head{background:var(--ink);border-color:var(--ink);
    box-shadow:inset 0 1px 1px rgba(255,255,255,.6),0 0 0 2px rgba(22,22,22,.14),0 0 12px rgba(22,22,22,.5);
    animation:beat 1.5s ease-in-out infinite;z-index:1}
  @keyframes beat{50%{box-shadow:inset 0 1px 1px rgba(255,255,255,.6),0 0 0 3px rgba(22,22,22,.2),0 0 18px rgba(22,22,22,.7)}}
  .lnk.pop{animation:pop .5s cubic-bezier(.2,1.5,.4,1) both}
  @keyframes pop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.22)}100%{transform:scale(1);opacity:1}}
  .sharebtn{margin-top:14px;width:100%;background:var(--card);border:1.5px solid var(--ink);
    color:var(--ink);font-weight:850;font-size:14.5px;padding:14px;border-radius:12px;cursor:pointer;box-shadow:var(--shadow)}
  .sharebtn:active{transform:translateY(1px)}
  .milestone{margin-top:14px;text-align:left}
  .milestone .mt{display:flex;justify-content:space-between;font-size:11.5px;font-weight:800;color:var(--sub);margin-bottom:6px}
  .mbar{height:9px;background:#f0ece2;border-radius:99px;overflow:hidden}
  .mbar i{display:block;height:100%;border-radius:99px;transition:width .7s cubic-bezier(.2,.8,.2,1)}

  .sec-t{font-size:14px;font-weight:850;margin:0 2px 10px;display:flex;align-items:center;justify-content:space-between}
  .sec-t .r{color:var(--dim);font-size:12px;font-weight:700}

  .mrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
  .mrow:last-child{border:none}
  .mrow .av{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;font-size:16px;flex:none;background:var(--card2)}
  .mrow .nm{font-weight:750;font-size:14.5px;flex:none}
  .mrow .gd{font-size:10.5px;font-weight:800;color:var(--gold);background:rgba(255,201,77,.12);padding:2px 7px;border-radius:999px}
  .mrow .prog{flex:1;height:9px;background:var(--card2);border-radius:99px;overflow:hidden;margin:0 4px}
  .mrow .prog i{display:block;height:100%;border-radius:99px;background:var(--sub)}
  .mrow .prog i.done{background:var(--ok)}
  .mrow .cnt{font-size:12.5px;font-weight:800;width:34px;text-align:right}
  .mrow .cnt.miss{color:var(--danger)}
  .mrow .cnt.done{color:var(--ok)}
  .mrow .live{font-size:11px;font-weight:800;color:var(--accent);background:rgba(255,90,31,.12);padding:3px 8px;border-radius:999px;animation:pl 1.6s infinite}
  @keyframes pl{50%{opacity:.5}}

  .chick{display:flex;align-items:center;gap:14px}
  .chick .big{font-size:40px}
  .chick .n{font-size:28px;font-weight:900;color:var(--chick)}
  .chick .d{color:var(--sub);font-size:12.5px}

  /* board feed */
  .feed .item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .feed .item:last-child{border:none}
  .feed .fic{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;font-size:19px;flex:none;background:var(--card2)}
  .feed .fic.cheer{background:rgba(255,201,77,.14)}
  .feed .fb{flex:1;min-width:0}
  .feed .fn{font-weight:800;font-size:14px}
  .feed .ft{color:var(--sub);font-size:13px;margin-top:2px}
  .feed .ftag{display:inline-block;font-size:11.5px;font-weight:800;color:var(--accent2);background:rgba(255,90,31,.1);padding:2px 8px;border-radius:999px;margin-right:5px}
  .feed .fago{color:var(--dim);font-size:11px;white-space:nowrap}
  .empty{color:var(--dim);font-size:13.5px;text-align:center;padding:24px 0}

  .codechip{display:inline-flex;align-items:center;gap:8px;background:var(--card2);border:1px dashed var(--line);
    border-radius:12px;padding:9px 14px;cursor:pointer;font-weight:850;letter-spacing:.12em;font-size:16px}
  .codechip small{font-size:11px;color:var(--dim);letter-spacing:0;font-weight:700}

  /* action bar */
  .actions{position:fixed;bottom:0;left:0;right:0;z-index:30;padding:0 0 env(safe-area-inset-bottom,0);
    background:var(--bg);border-top:1px solid var(--line)}
  .actions .wrap{padding:0;display:flex;gap:0;max-width:var(--maxw);margin:0 auto}
  .actions button{flex:1;border:none;cursor:pointer;font-family:inherit;font-weight:850;font-size:15px;padding:15px;border-radius:14px}
  .a-start{background:var(--card);color:var(--txt);border:1px solid var(--line)}
  .a-check{background:var(--accent);color:#fff}
  .a-cheer{background:var(--card2);color:var(--ink);border:1px solid var(--line)}

  /* modal */
  .modal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);display:none;align-items:flex-end}
  .modal.open{display:flex}
  .sheet{background:var(--bg);width:100%;max-width:var(--maxw);margin:0 auto;border-radius:22px 22px 0 0;
    max-height:92vh;overflow-y:auto;padding:8px 20px 32px;animation:up .28s cubic-bezier(.2,.9,.3,1)}
  @keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
  .grip{width:40px;height:5px;border-radius:99px;background:var(--line);margin:8px auto 8px}
  .sheet h2{font-size:20px;font-weight:900;margin:6px 0 2px}
  .sheet .desc{color:var(--sub);font-size:13px;margin-bottom:4px}
  .field{margin-top:18px}
  .field label{display:block;font-weight:800;font-size:14px;margin-bottom:9px}
  .field .opt{color:var(--dim);font-weight:600;font-size:12px}
  input,textarea{width:100%;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:14px;color:var(--txt);font-size:16px;font-family:inherit}
  input:focus,textarea:focus{outline:none;border-color:var(--accent)}
  textarea{min-height:60px;resize:vertical}
  .code-in{text-transform:uppercase;letter-spacing:.3em;font-weight:850;text-align:center;font-size:22px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{cursor:pointer}
  .chip input{position:absolute;opacity:0;pointer-events:none}
  .chip span{display:block;font-size:14px;font-weight:700;padding:10px 13px;border-radius:12px;background:var(--card);border:1.5px solid var(--line);color:var(--sub)}
  .chip input:checked + span{background:rgba(229,53,43,.16);border-color:var(--accent);color:#ff6a60}
  .chip.big span{font-size:24px;padding:12px 16px}
  .submit{width:100%;background:var(--accent);color:#fff;font-weight:850;font-size:16px;padding:16px;border:none;border-radius:12px;cursor:pointer;margin-top:24px}
  .submit:disabled{opacity:.5}
  .ghost-btn{background:transparent;border:none;color:var(--dim);font-size:14px;margin-top:16px;cursor:pointer;width:100%}
  .done{text-align:center;padding:20px 0 6px}
  .done .ic{font-size:52px}
  .done h2{margin-top:10px}
  .done p{color:var(--sub);font-size:14px;margin-top:10px}
  .codebox{font-size:40px;font-weight:900;letter-spacing:.2em;color:var(--gold);margin:18px 0 6px}
  .timerbar{background:rgba(255,90,31,.1);border:1px solid rgba(255,90,31,.3);border-radius:12px;padding:12px;margin-top:14px;text-align:center;font-weight:800;color:var(--accent2)}

  /* ── 인증샷 ── */
  .photobtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:1.5px dashed rgba(229,53,43,.45);
    background:rgba(229,53,43,.08);color:#ff6a60;font-weight:800;font-size:14px;padding:16px;border-radius:12px;cursor:pointer}
  .photoprev{position:relative;margin-top:10px;border-radius:14px;overflow:hidden;border:1px solid var(--line)}
  .photoprev img{width:100%;display:block;max-height:240px;object-fit:cover}
  .photoprev .rm{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;border:none;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer}
  .feed .fphoto{margin-top:8px;border-radius:12px;overflow:hidden;border:1px solid var(--line);cursor:pointer;max-width:240px}
  .feed .fphoto img{width:100%;display:block;max-height:220px;object-fit:cover}
  .gallery{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
  .gallery::-webkit-scrollbar{display:none}
  .gthumb{flex:none;width:86px;height:86px;border-radius:14px;overflow:hidden;border:1px solid var(--line);cursor:pointer;position:relative}
  .gthumb img{width:100%;height:100%;object-fit:cover}
  .gthumb .gn{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(0,0,0,.65));color:#fff;font-size:10px;font-weight:800;padding:10px 6px 4px}
  .lightbox{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;padding:18px}
  .lightbox.open{display:flex}
  .lightbox img{max-width:100%;max-height:84%;border-radius:14px}
  .lightbox .cap{position:absolute;bottom:26px;left:0;right:0;text-align:center;color:#fff;font-weight:800;font-size:14px;text-shadow:0 1px 4px rgba(0,0,0,.6)}
  .linkbox{width:100%;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:12px;
    color:var(--sub);font-size:13px;text-align:center;margin:4px 0 14px;font-family:inherit}
  /* ── 터널 입장 (시그니처) ── */
  .tunnel{position:fixed;inset:0;z-index:300;background:#0A0A0A;display:grid;place-items:center;overflow:hidden;
    opacity:0;animation:tnl-in .28s ease forwards}
  .tunnel.out{animation:tnl-out .5s ease forwards}
  @keyframes tnl-in{to{opacity:1}} @keyframes tnl-out{to{opacity:0;visibility:hidden}}
  .tunnel .glow{position:absolute;width:520px;height:520px;border-radius:50%;filter:blur(80px);opacity:.5;
    animation:tnl-glow 2.2s ease forwards}
  @keyframes tnl-glow{0%{transform:scale(.3);opacity:0}30%{opacity:.55}100%{transform:scale(1.25);opacity:.28}}
  .tunnel .tn-in{position:relative;text-align:center;color:#fff}
  .tunnel .tn-em{width:120px;height:120px;border-radius:26px;display:grid;place-items:center;margin:0 auto 18px;
    font-size:56px;font-weight:900;color:#fff;animation:tnl-em .9s cubic-bezier(.2,1.4,.3,1) both}
  @keyframes tnl-em{0%{transform:scale(.4);opacity:0}100%{transform:scale(1);opacity:1}}
  .tunnel .tn-nm{font-size:30px;font-weight:900;letter-spacing:-.02em;opacity:0;animation:tnl-up .5s ease .25s forwards}
  .tunnel .tn-mw{font-family:var(--font-num);font-size:18px;color:var(--sub);margin-top:8px;letter-spacing:.05em;
    opacity:0;animation:tnl-mw .7s ease .4s forwards}
  @keyframes tnl-up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes tnl-mw{from{opacity:0;letter-spacing:.4em}to{opacity:1;letter-spacing:.18em}}
  .tunnel .wall{position:absolute;top:0;bottom:0;width:50%;background:#111;z-index:2}
  .tunnel .wall.l{left:0;animation:wall-l 1.7s cubic-bezier(.7,0,.2,1) forwards}
  .tunnel .wall.r{right:0;animation:wall-r 1.7s cubic-bezier(.7,0,.2,1) forwards}
  @keyframes wall-l{0%,18%{transform:translateX(0)}100%{transform:translateX(-100%)}}
  @keyframes wall-r{0%,18%{transform:translateX(0)}100%{transform:translateX(100%)}}
  @media (prefers-reduced-motion: reduce){
    .tunnel .glow,.tunnel .wall{display:none}
    .tunnel .tn-em,.tunnel .tn-nm,.tunnel .tn-mw{animation:tnl-up .4s ease forwards}
  }

  .toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(16px);
    background:var(--txt);color:var(--bg);font-weight:850;font-size:14px;padding:12px 20px;border-radius:12px;
    opacity:0;transition:.25s;z-index:200;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<script>
/* ===================== 상수 ===================== */
const ACTS = [["헬스","🏋️"],["러닝","🏃"],["수영","🏊"],["홈트","🏠"],["요가","🧘"],["클라이밍","🧗"],["자전거","🚴"],["구기","⚽"],["기타","✨"]];
const ACT_EMOJI = Object.fromEntries(ACTS);
const PARTS = ["가슴","등","어깨","팔","하체","복근","유산소","전신"];   // 헬스 하위 부위
const PART_EMOJI = {"가슴":"🎽","등":"🔙","어깨":"🏔️","팔":"💪","하체":"🦵","복근":"🧊","유산소":"🏃","전신":"🔥"};
const MOODS = ["🔥 빡세게","💪 가볍게","😮‍💨 힘듦","😌 개운"];
const STICKERS = ["🔥","💪","👏","🫡","🙌","❤️"];
const WEEK_MS = 7*24*3600*1000;

/* ===================== 계정 / 멤버십 ===================== */
let ME = null;                   // 내 프로필 {id, nickname, avatar, bio}
let MEMS = [];                   // 내 멤버십 [{crewId, memberId, role, name, code, crewName}]
let MODE = "local";
let pendingInvite = null;        // ?code= 로 들어온 초대 코드 (로그인 후 처리)
const meKey = "sasl_me";         // 로컬 모드 멤버십 저장
const getMe  = () => { try { return JSON.parse(localStorage.getItem(meKey)||"[]"); } catch { return []; } };
const setMe  = a => localStorage.setItem(meKey, JSON.stringify(a));
function addMe(m){ const a=getMe().filter(x=>String(x.crewId)!==String(m.crewId)); a.unshift(m); setMe(a); }
const myMember = cid => MEMS.find(x=>String(x.crewId)===String(cid));
// 로그인 없음 → 내 크루 목록은 이 기기(localStorage)에 저장
async function loadMemberships(){
  if(!ME){ MEMS=[]; return; }
  let db=[]; try{ db = await DB.getMyCrews(ME.id); }catch(_){}

];
function tierOf(n){ let cur=TIERS[0], next=null;
  for(let i=0;i<TIERS.length;i++){ if(n>=TIERS[i].min) cur=TIERS[i]; else { next=TIERS[i]; break; } }
  return {cur,next};
}
// 고리 HTML: 최근 popN개는 튕겨 붙는 애니메이션, 마지막 고리는 빛남(head)
function chainLinksHTML(n, popN){
  const cap=Math.min(n,120);
  let h="";
  for(let i=0;i<cap;i++){
    const head=i===cap-1;
    const pop=popN>0 && i>=cap-popN;
    const delay=pop?(i-(cap-popN))*70:0;
    h+=`<span class="lnk${head?' head':''}${pop?' pop':''}"${pop?` style="animation-delay:${delay}ms"`:''}></span>`;
  }
  return h;
}
function animateCount(id, from, to, ms){
  const el=document.getElementById(id); if(!el) return;
  if(from===to){ el.textContent=to; return; }
  const t0=performance.now();
  (function step(t){
    const p=Math.min(1,(t-t0)/ms), e=1-Math.pow(1-p,3); // easeOutCubic
    el.textContent=Math.round(from+(to-from)*e);
    if(p<1) requestAnimationFrame(step); else el.textContent=to;
  })(t0);
}

/* ===================== 핏 (크루 캐릭터) ===================== */
// 레벨 = 누적 인증(절대 안 빠짐), 컨디션 = 최근 7일 달성률(근손실 장치)
// 팀 폼 상태 5단계 · 화살표 글리프(이모지 없음), 하락은 무채색·최상만 그린
const CONDS=[
  {n:"폼 바닥",e:"▼▼",c:"#6a6a72"},
  {n:"하락세",e:"▼", c:"#9a9aa4"},
  {n:"보합",  e:"→", c:"#9a9aa4"},
  {n:"상승세",e:"▲", c:"#22c55e"},
  {n:"폼 최고",e:"▲▲",c:"#22c55e"},
];
function ovrOf(level){ return Math.min(99, 46 + Math.min(level,26)*2); }
function computeCharacter(crew, members, checkins){
  const goal=Number(crew.goal)||3;
  const wm=members.filter(m=>m.role!=="guardian");
  const ids=new Set(wm.map(m=>String(m.id)));
  const workouts=checkins.filter(c=>(c.type||"workout")==="workout" && ids.has(String(c.member_id)));
  const total=workouts.length;                 // 누적 인증 = 밥 먹은 횟수
  const level=Math.floor(total/3)+1;           // 3끼에 레벨업
  const weekAgo=Date.now()-7*86400000;
  const recent=workouts.filter(c=>new Date(c.created_at).getTime()>=weekAgo).length;
  const expected=Math.max(1, wm.length*goal);
  const rate=recent/expected;
  const cond = rate>=1?4 : rate>=0.7?3 : rate>=0.4?2 : rate>=0.15?1 : 0;
  return {level,total,cond,rate,recent,expected};
}
// 도트(픽셀) 스프라이트 — 컨디션으로 표정, OVR/레벨로 팔(근육) 두께
function characterSVG(level, cond){
  const C=13, dark="#191c22";
  const body = cond<=1 ? "#98a0ac" : "#ccd3dd";
  const armN = Math.max(1, Math.min(3, (cond>=3?2:1) + Math.floor(Math.min(level,24)/8)));
  const eyes = cond===0 ? "#.-...-.#" : "#.o...o.#";
  const mw = cond>=4?5 : cond>=2?3 : cond>=1?1 : 3;         // 입 폭(웃음~찡그림)
  const m=Array(9).fill("."); m[0]="#"; m[8]="#";
  const st=Math.floor((9-mw)/2); for(let i=0;i<mw;i++) m[st+i]="m";
  const map=[".#######.","#########",eyes,"#########",m.join(""),"#########","#########","#########",".#######.",".##.#.##.",".##...##."];
  const cols=9, rows=map.length, armMax=3, xOff=armMax*C, W=(cols+armMax*2)*C, H=rows*C;
  let px="";
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const ch=map[r][c]; if(ch===".") continue;
    px+=`<rect x="${xOff+c*C}" y="${r*C}" width="${C}" height="${C}" fill="${(ch==="o"||ch==="m"||ch==="-")?dark:body}"/>`;
  }
  let arms="";
  for(let ac=0;ac<armN;ac++) for(const r of [4,5,6]){
    arms+=`<rect x="${xOff-(ac+1)*C}" y="${r*C}" width="${C}" height="${C}" fill="${body}"/>`;
    arms+=`<rect x="${xOff+cols*C+ac*C}" y="${r*C}" width="${C}" height="${C}" fill="${body}"/>`;
  }
  const sweat = cond===0 ? `<rect x="${xOff+1*C}" y="${1*C}" width="${C}" height="${C}" fill="#4a9fd6"/>` : "";
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">${arms}${px}${sweat}</svg>`;
}

/* ===================== 유틸 ===================== */
const esc = s => (""+(s??"")).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
// 등번호: 1~99 정수만 유효(그 외 null)
function parseJersey(v){ const n=parseInt((""+(v??"")).trim(),10); return (n>=1&&n<=99)?n:null; }
// 등번호 배지 HTML(구단 넘버 · Anton) — 없으면 빈 문자열
function jerseyTag(m){ const n=parseJersey(m&&m.jersey_no); return n!==null?`<span class="jno">${n}</span>`:""; }
// 클럽 통산 km: 운동 인증의 distance_km 합(없으면 note에서 "12km" 파싱)
function clubKm(members, checkins){
  const ids=new Set((members||[]).filter(m=>m.role!=="guardian").map(m=>String(m.id)));
  let km=0;
  (checkins||[]).forEach(c=>{
    if((c.type||"workout")!=="workout" || !ids.has(String(c.member_id))) return;
    if(c.distance_km!=null && c.distance_km!==""){ km+=Number(c.distance_km)||0; return; }
    const m=(""+(c.note||"")).match(/(\d+(?:\.\d+)?)\s*km/i); if(m) km+=parseFloat(m[1])||0;
  });
  return Math.round(km*10)/10;
}
function ago(iso){ const s=(Date.now()-new Date(iso).getTime())/1000;
  if(s<60)return"방금"; if(s<3600)return Math.floor(s/60)+"분 전"; if(s<86400)return Math.floor(s/3600)+"시간 전"; return Math.floor(s/86400)+"일 전"; }
const curWk = () => DB.weekStartTs(Date.now());
const weekCount = (cid,mid) => cache.checkins.filter(c=>String(c.member_id)===String(mid)&&(c.type||"workout")==="workout"&&DB.weekStartTs(c.created_at)===curWk()).length;
// 이번 주 요일별 인증 여부 (월~일)
function weekDays(mid){
  const wk=curWk(), days=[false,false,false,false,false,false,false];
  cache.checkins.forEach(c=>{
    if(String(c.member_id)!==String(mid) || (c.type||"workout")!=="workout") return;
    if(DB.weekStartTs(c.created_at)!==wk) return;
    const t=new Date(c.created_at); days[(t.getDay()+6)%7]=true;
  });
  return days;
}
const todayDow = () => (new Date().getDay()+6)%7;
function activeWorkouts(){
  const res=[];
  for(const m of cache.members){
    if(m.role==="guardian") continue;
    const mine=cache.checkins.filter(c=>String(c.member_id)===String(m.id));
    const starts=mine.filter(c=>c.type==="start").sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    if(!starts.length) continue;
    const last=starts[0];
    const laterWorkout=mine.some(c=>c.type==="workout"&&new Date(c.created_at)>new Date(last.created_at));
    const el=Date.now()-new Date(last.created_at).getTime();
    if(!laterWorkout && el<3*3600*1000) res.push({m, mins:Math.floor(el/60000)});
  }
  return res;
}

async function copyText(t){
  try{ await navigator.clipboard.writeText(t); return true; }
  catch(_){
    try{ const ta=document.createElement("textarea"); ta.value=t; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.focus(); ta.select(); const ok=document.execCommand("copy"); document.body.removeChild(ta); return ok; }
    catch(e){ return false; }
  }
}

// 캔버스로 리사이즈·JPEG 압축 → data URL (별도 저장소 없이 DB에 저장)
function downscaleImage(file, maxDim, quality){
  return new Promise((res,rej)=>{
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{ let w=img.naturalWidth,h=img.naturalHeight; const s=Math.min(1,maxDim/Math.max(w,h));
      w=Math.round(w*s); h=Math.round(h*s);
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h); URL.revokeObjectURL(url);
      try{ res(cv.toDataURL("image/jpeg",quality)); }catch(e){ rej(e); } };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error("이미지를 읽을 수 없어요")); };
    img.src=url;
  });
}

const FONT='-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif';
function loadImg(src){ return new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=()=>rej(new Error("img")); i.src=src; }); }
function roundRect(g,x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }
function drawLinks(g,cx,y,n){
  const lw=46,lh=23,gap=-11,total=n*(lw+gap)-gap; let x=cx-total/2;
  for(let i=0;i<n;i++){ const gr=g.createLinearGradient(x,y-lh/2,x,y+lh/2); gr.addColorStop(0,"#ffe6a8"); gr.addColorStop(1,"#d98a00");
    g.fillStyle=gr; roundRect(g,x,y-lh/2,lw,lh,11); g.fill(); g.strokeStyle="rgba(170,110,0,.4)"; g.lineWidth=2; g.stroke(); x+=lw+gap; }
}
async function drawCollage(g,photos,x,y,w,h){
  if(!photos.length){ g.textAlign="center"; g.fillStyle="#dfe3ea"; g.font=`220px ${FONT}`; g.fillText("⛓️",x+w/2,y+h/2+70); return; }
  const imgs=(await Promise.all(photos.map(p=>loadImg(p).catch(()=>null)))).filter(Boolean);
  const n=Math.min(imgs.length,4), gap=16; let cells;
  const cw2=(w-gap)/2, ch2=(h-gap)/2;
  if(n===1) cells=[[x,y,w,h]];
  else if(n===2) cells=[[x,y,cw2,h],[x+cw2+gap,y,cw2,h]];
  else if(n===3) cells=[[x,y,cw2,h],[x+cw2+gap,y,cw2,ch2],[x+cw2+gap,y+ch2+gap,cw2,ch2]];
  else cells=[[x,y,cw2,ch2],[x+cw2+gap,y,cw2,ch2],[x,y+ch2+gap,cw2,ch2],[x+cw2+gap,y+ch2+gap,cw2,ch2]];
  imgs.slice(0,n).forEach((img,i)=>{
    const [cx,cy,cw,ch]=cells[i]; g.save(); roundRect(g,cx,cy,cw,ch,28); g.clip();
    const ar=img.width/img.height, car=cw/ch; let dw,dh,dx,dy;
    if(ar>car){ dh=ch; dw=ch*ar; dx=cx-(dw-cw)/2; dy=cy; } else { dw=cw; dh=cw/ar; dx=cx; dy=cy-(dh-ch)/2; }
    g.drawImage(img,dx,dy,dw,dh); g.restore();
    g.strokeStyle="rgba(0,0,0,.06)"; g.lineWidth=2; roundRect(g,cx,cy,cw,ch,28); g.stroke();
  });
}
/* ── 카드 공통 규격 (스토리 1080×1920) · pitch-black + team-color ── */
const CW=1080, CH=1920;
// 실제 배포 주소에서 유도(하드코딩 도메인 404 방지)
const CARD_URL=(location.host+location.pathname).replace(/\/index\.html$/,"").replace(/\/$/,"")||"formclub";
function newCard(){ const cv=document.createElement("canvas"); cv.width=CW; cv.height=CH; return cv; }
function cardFrame(g,color){
  g.fillStyle="#0A0A0A"; g.fillRect(0,0,CW,CH);
  // 상단 team-color 밴드(구단 정채색)
  g.fillStyle=color; g.fillRect(0,0,CW,14);
  g.strokeStyle="rgba(255,255,255,.10)"; g.lineWidth=2; g.strokeRect(44,60,CW-88,CH-120);
  g.textAlign="center";
}
function cardEmblem(g,emblem,color,cx,cy,r){
  g.beginPath(); g.arc(cx,cy,r,0,7); g.fillStyle=color; g.fill();
  g.fillStyle="#fff"; g.font=`900 ${Math.round(r*1.0)}px ${FONT}`; g.textBaseline="middle";
  g.fillText(emblem||"●",cx,cy+2); g.textBaseline="alphabetic";
}
function cardFooter(g,code){
  g.fillStyle="#9A9D96"; g.font=`700 34px ${FONT}`; g.fillText("우리 팀이 구단이 되는 곳 · 폼클럽",CW/2,1788);
  if(code){ g.fillStyle="#fff"; g.font=`900 48px ${FONT}`; g.fillText(`코드 ${code} 로 합류`,CW/2,1846); }
  g.fillStyle="#9A9D96"; g.font=`600 30px ${FONT}`; g.fillText(CARD_URL,CW/2,1892);
}
const clip = (s,n)=> (s&&s.length>n)?s.slice(0,n)+"…":s;
async function blobOf(cv){ return await new Promise(res=>cv.toBlob(res,"image/png",.92)); }

// ① 팀 폼 카드 — 컨디션·OVR·창단 통산 + 사진
async function drawFormCard({crewName,emblem,color,cond,ovr,chain,km,photos,code,matchweek}){
  const cv=newCard(), g=cv.getContext("2d"); cardFrame(g,color);
  cardEmblem(g,emblem,color,CW/2,210,72);
  g.fillStyle="#fff"; g.font=`900 60px ${FONT}`; g.fillText(clip(crewName,14),CW/2,352);
  g.fillStyle="#9A9D96"; g.font=`400 34px "Anton",sans-serif`; g.fillText(`MATCHWEEK ${matchweek} · TEAM FORM`,CW/2,404);
  g.fillStyle=cond.c; g.font=`400 96px "Anton",sans-serif`; g.fillText(`${cond.e} ${cond.n}`,CW/2,520);
  g.fillStyle="#fff"; g.font=`400 150px "Anton",sans-serif`; g.textBaseline="middle"; g.fillText(String(ovr),CW/2,660); g.textBaseline="alphabetic";
  g.fillStyle="#9A9D96"; g.font=`800 40px ${FONT}`; g.fillText("OVR",CW/2,760);
  g.fillStyle="#9A9D96"; g.font=`600 40px ${FONT}`; g.fillText(`창단 이래 ${chain.toLocaleString()}회${km>0?` · ${km.toLocaleString()}km`:""}`,CW/2,835);
  await drawCollage(g,photos,90,900,CW-180,700);
  cardFooter(g,code);
  return await blobOf(cv);
}
// ② 스쿼드 발표 카드 — 이번 주 달성자만 명단(등번호·이름)
async function drawSquadCard({crewName,emblem,color,matchweek,achievers,teamTrainings,code}){
  const cv=newCard(), g=cv.getContext("2d"); cardFrame(g,color);
  cardEmblem(g,emblem,color,CW/2,200,68);
  g.fillStyle="#fff"; g.font=`900 58px ${FONT}`; g.fillText(clip(crewName,14),CW/2,332);
  g.fillStyle=color; g.font=`400 72px "Anton",sans-serif`; g.fillText(`MATCHWEEK ${matchweek} SQUAD`,CW/2,430);
  g.fillStyle="#9A9D96"; g.font=`700 36px ${FONT}`; g.fillText(`이번 주 팀 훈련 ${teamTrainings}회 · 목표 달성 명단`,CW/2,490);
  let y=610; const list=achievers.slice(0,11);
  if(!list.length){ g.fillStyle="#9A9D96"; g.font=`700 44px ${FONT}`; g.fillText("아직 명단에 오른 선수가 없습니다",CW/2,760); }
  list.forEach(a=>{
    g.textAlign="right"; g.fillStyle=color; g.font=`400 60px "Anton",sans-serif`; g.fillText(a.no!=null?String(a.no):"–",CW/2-30,y);
    g.textAlign="left"; g.fillStyle="#fff"; g.font=`800 52px ${FONT}`; g.fillText(clip(a.name,12),CW/2-0,y-4);

// ③ 영입 발표 카드 — 신규 합류 선수
async function drawSigningCard({crewName,emblem,color,no,name,code}){
  const cv=newCard(), g=cv.getContext("2d"); cardFrame(g,color);

  g.fillStyle="#9A9D96"; g.font=`400 44px "Anton",sans-serif`; g.fillText("OFFICIAL · 영입 공식 발표",CW/2,470);
  g.fillStyle="#fff"; g.font=`900 56px ${FONT}`; g.fillText(clip(crewName,14),CW/2,556);
  if(no!=null){ g.fillStyle=color; g.font=`400 320px "Anton",sans-serif`; g.textBaseline="middle"; g.fillText(String(no),CW/2,920); g.textBaseline="alphabetic"; }
  g.fillStyle="#fff"; g.font=`900 96px ${FONT}`; g.fillText(clip(name,10),CW/2,no!=null?1180:1000);
  g.fillStyle="#9A9D96"; g.font=`700 40px ${FONT}`; g.fillText("계약기간: 시즌 1",CW/2,no!=null?1260:1080);

// 공통 공유(파일 우선 → 다운로드 폴백)
async function shareCard(blob,filename,text){
  const file=new File([blob],filename,{type:"image/png"});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    await navigator.share({files:[file],text}); return;
  }
  const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),4000);
  toast("이미지 저장됨! 인스타 스토리에 올려보세요 📸");
}

        <div class="opt" style="margin-top:6px">잊으면 내 크루를 못 찾아요. 폰·은행 PIN 재사용 금지.</div></div>
      <div class="field" style="text-align:left"><label>한줄 소개 <span class="opt">(선택)</span></label><input id="pfBio" maxlength="40" placeholder="예: 3대 400 목표 / 새벽러" value="${esc(bio)}"></div>
      <button class="btn primary" style="margin-top:18px" id="pfSaveBtn" onclick="saveProfile()">${editingProfile?"저장":"시작하기"}</button>
      <p id="pfMsg" style="color:var(--danger);font-size:13px;margin-top:8px"></p>
    </div>`;
  document.getElementById("avatarInput").onchange=async e=>{
    const f=e.target.files&&e.target.files[0]; if(!f) return;
    try{ pendingAvatar=await downscaleImage(f,256,0.7);
      document.getElementById("avatarPrev").innerHTML=`<img src="${pendingAvatar}">`;
    }catch(_){ alert("사진 처리 실패"); }
  };
}
async function saveProfile(){
  const nick=document.getElementById("pfNick").value.trim();
  const pin=(document.getElementById("pfPin").value||"").trim();
  if(!nick){ document.getElementById("pfMsg").textContent="닉네임을 입력하세요"; return; }
  if(!/^\d{4,6}$/.test(pin)){ document.getElementById("pfMsg").textContent="PIN을 숫자 4~6자리로 입력하세요"; return; }
  const btn=document.getElementById("pfSaveBtn"); btn.disabled=true; btn.textContent="저장 중…";
  try{
    const p=await DB.upsertProfile({nickname:nick, pin, avatar:pendingAvatar, bio:document.getElementById("pfBio").value.trim()});
    ME=p;
    if(editingProfile){ editingProfile=false; showProfBtn(); renderProfile(); }
    else { await afterLogin(); }
  }catch(err){ document.getElementById("pfMsg").textContent=(err.message||err); btn.disabled=false; btn.textContent="저장"; }
}

/* ===================== 내 프로필 화면 ===================== */
async function renderProfile(){
  document.getElementById("actions").style.display="none";
  document.getElementById("app").innerHTML=`<div class="empty" style="padding:50px">불러오는 중…</div>`;
  let totalCk=0, totalPhoto=0, bestChain=0;
  for(const mem of MEMS){
    try{
      const [crew,members,checkins]=await Promise.all([DB.getCrew(mem.crewId),DB.getMembers(mem.crewId),DB.getCheckins(mem.crewId)]);
      const mine=checkins.filter(c=>String(c.member_id)===String(mem.memberId));
      totalCk+=mine.filter(c=>(c.type||"workout")==="workout").length;
      totalPhoto+=mine.filter(c=>c.photo).length;
      if(crew){ const r=DB.computeChain(crew,members,checkins); bestChain=Math.max(bestChain,r.chain); }
    }catch(_){}
  }
  const {cur}=tierOf(bestChain);
  document.getElementById("app").innerHTML=`
    <div style="padding:16px 0 4px"><button class="linkback" onclick="render()">← 뒤로</button></div>
    <div class="card" style="text-align:center">
      <div class="avatarbig">${ME.avatar?`<img src="${ME.avatar}">`:esc((ME.nickname||"?").slice(0,1))}</div>
      <div style="font-size:22px;font-weight:900;margin-top:12px">${esc(ME.nickname)}</div>
      ${ME.bio?`<div style="color:var(--sub);font-size:14px;margin-top:4px">${esc(ME.bio)}</div>`:""}
      <div class="tier" style="color:${cur.color};margin-top:12px">${cur.emoji} ${cur.name}</div>
    </div>
    <div class="statgrid">
      <div class="statc"><b>${MEMS.length}</b><span>크루</span></div>
      <div class="statc"><b>${totalCk}</b><span>총 인증</span></div>
      <div class="statc"><b>${bestChain}</b><span>최고 고리</span></div>
      <div class="statc"><b>${totalPhoto}</b><span>인증샷</span></div>
    </div>
    <button class="btn ghost" style="margin-top:16px" onclick="openEditProfile()">프로필 수정</button>
    <button class="btn ghost" style="margin-top:10px;color:var(--danger)" onclick="doLogout()">이 기기에서 초기화</button>`;
}
function openEditProfile(){ editingProfile=true; renderProfileSetup(); }
async function doLogout(){
  if(!confirm("이 기기에서 프로필과 크루 목록을 초기화할까요?\n(크루 자체는 안 지워지고, 코드로 다시 들어올 수 있어요)")) return;
  localStorage.removeItem("sasl_profile_local"); localStorage.removeItem("sasl_me"); localStorage.removeItem("sasl_current");
  ME=null; MEMS=[]; VIEW=null; hideProfBtn(); await bootstrap();
}

/* ===================== 초기화 / 인증 게이트 ===================== */
async function afterLogin(){
  showProfBtn();
  await loadMemberships();
  const cur=localStorage.getItem("sasl_current");
  VIEW = (cur && MEMS.some(x=>String(x.crewId)===String(cur))) ? cur : null;
  render();
  if(pendingInvite && !MEMS.some(x=>x.code===pendingInvite)){ openJoin(pendingInvite); }
  pendingInvite=null;
}
async function bootstrap(){
  // 로그인 없음: 이 기기에 닉네임(프로필)만 있으면 바로 시작
  const profile=await DB.getProfile();
  if(!profile || !profile.nickname || !profile.pin){ ME=null; renderProfileSetup(); return; }
  ME=profile;
  await afterLogin();
}
(async function init(){
  MODE=await DB.mode(); const b=document.getElementById("modeBadge");
  if(MODE==="supabase"){ b.textContent="● 실시간"; b.classList.add("live"); } else b.textContent="로컬";
  const code=new URLSearchParams(location.search).get("code");
  pendingInvite = code ? code.toUpperCase() : null;
  initKakao();
  await bootstrap();
  setInterval(()=>{ if(VIEW && ME && !document.querySelector(".modal.open")) renderCrew(VIEW); }, 25000);
})();
</script>
</body>
</html>
