<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>10초 인증</title>
<link rel="stylesheet" href="screen.css"></head>
<body><div class="scr">
  <header>
    <div class="logo"><span>⛓️</span> <b>쇠사슬</b></div>
    <span class="mode">● 실시간</span>
  </header>
  <div class="wrap" style="padding-top:16px;opacity:.3">
    <div class="chainhero"><div class="lbl">우리가 쌓은 쇠사슬</div><div class="chainbig">14<span class="u"> 고리</span></div></div>
  </div>
  <div class="dim"></div>
  <div class="sheet">
    <div class="grip"></div>
    <h2>10초 인증 ✅</h2>
    <p class="desc">오늘 운동 완료! 부위만 찍고 끝. 고리 +1 ⛓️</p>
    <div class="timerbar">⏱ 운동 시작한 지 41분 — 인증하면 마무리돼요</div>
    <div class="field"><label>오늘 부위 <span class="opt">(여러 개 가능)</span></label>
      <div class="chips">
        <span class="chip on">🎽 가슴</span><span class="chip on">💪 팔</span>
        <span class="chip">🔙 등</span><span class="chip">🏔️ 어깨</span>
        <span class="chip">🦵 하체</span><span class="chip">🧊 복근</span>
        <span class="chip">🏃 유산소</span><span class="chip">🔥 전신</span>
      </div></div>
    <div class="field"><label>오늘 느낌 <span class="opt">(선택)</span></label>
      <div class="chips">
        <span class="chip on">🔥 빡세게</span><span class="chip">💪 가볍게</span>
        <span class="chip">😮‍💨 힘듦</span><span class="chip">😌 개운</span>
      </div></div>
    <div class="field"><label>한마디 <span class="opt">(선택)</span></label>
      <div class="inp" style="color:var(--txt)">벤치 5kg 늘었다 🔥</div></div>
    <button class="submit">인증하고 고리 +1</button>
    <div class="ghost-btn">닫기</div>
  </div>
</div></body></html>
