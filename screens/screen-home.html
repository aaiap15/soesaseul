<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>홈</title>
<link rel="stylesheet" href="screen.css"></head>
<body><div class="scr">
  <header>
    <div class="logo"><span>⛓️</span> <b>쇠사슬</b></div>
    <span class="mode">● 실시간</span>
  </header>
  <div class="wrap">
    <div style="padding:30px 0 8px">
      <h1>같이 운동하자는 약속,<br><span class="accent">이번엔 안 깨지게.</span></h1>
      <p class="lead">크루의 <b>쇠사슬</b>로 서로 끌고 가요. 한 명이 빠지면 사슬이 끊겨요.<br>인증 1번 = 고리 +1 ⛓️</p>
    </div>
    <div class="card">
      <div style="font-weight:800;font-size:15px;margin-bottom:6px">이렇게 돼요</div>
      <div style="color:var(--sub);font-size:13.5px;line-height:1.8">
        1️⃣ 아는 친구끼리 크루 생성 → 코드 공유<br>
        2️⃣ 매주 목표만큼 <b>10초 인증</b> (부위만 찍기)<br>
        3️⃣ 다 채우면 사슬이 자라고, 한 명이라도 빠지면 <b>절단</b> + 🍗치킨 적립<br>
        4️⃣ 운동 안 하는 친구는 <b>가디언</b>으로 응원 참여
      </div>
    </div>
    <div style="margin-top:18px"></div>
    <button class="btn primary">크루 만들기</button>
    <button class="btn ghost">코드로 참여하기</button>
  </div>
</div></body></html>
