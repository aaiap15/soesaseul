<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>가디언 응원</title>
<link rel="stylesheet" href="screen.css"></head>
<body><div class="scr">
  <header>
    <div class="logo"><b>폼클럽</b></div>
    <span class="mode">● 실시간</span>
  </header>
  <div class="wrap" style="padding-top:16px;opacity:.3">
    <div class="chainhero"><div class="lbl">우리가 쌓은 사슬</div><div class="chainbig">14<span class="u"> 고리</span></div></div>
  </div>
  <div class="dim"></div>
  <div class="sheet">
    <div class="grip"></div>
    <h2>응원 보내기 🙌</h2>
    <p class="desc">크루가 힘내게 스티커를 날리세요.</p>
    <div class="field"><label>스티커</label>
      <div class="chips">
        <span class="chip big on">🔥</span><span class="chip big">💪</span><span class="chip big">👏</span>
        <span class="chip big">🫡</span><span class="chip big">🙌</span><span class="chip big">❤️</span>
      </div></div>
    <div class="field"><label>한마디 <span class="opt">(선택)</span></label>
      <div class="inp" style="color:var(--txt)">오늘도 화이팅! 빠지면 치킨이다 🍗</div></div>
    <button class="submit" style="background:linear-gradient(120deg,var(--gold),#ffb43c);color:#241a00">응원 보내기</button>
    <div class="ghost-btn">닫기</div>
  </div>
</div></body></html>
