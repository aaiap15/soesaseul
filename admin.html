<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>쇠사슬 · 운영자 화면</title>
<style>
  :root{--bg:#f2f4f7;--card:#ffffff;--card2:#eef1f5;--line:#e5e8ee;--txt:#1a1d23;--sub:#667085;--dim:#98a2b3;
    --accent:#f5501a;--gold:#e39a00;--ok:#12b886;--danger:#f04438;--chick:#f97316;
    --shadow:0 1px 2px rgba(16,24,40,.04),0 6px 20px rgba(16,24,40,.06);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);padding:18px;line-height:1.5}
  .wrap{max-width:1000px;margin:0 auto}
  h1{font-size:21px;font-weight:900}
  .sub{color:var(--sub);font-size:13px;margin-top:3px}
  .mode{display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;margin-left:8px}
  .mode.live{background:rgba(53,208,165,.15);color:var(--ok)}
  .mode.local{background:rgba(255,93,108,.15);color:var(--danger)}

  .signals{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
  .sig{background:linear-gradient(165deg,#fff6e9,#ffffff 60%);border:1px solid #f4e6cf;border-radius:16px;padding:18px;box-shadow:var(--shadow)}
  .sig .k{color:var(--sub);font-size:12.5px;font-weight:700}
  .sig .v{font-size:34px;font-weight:900;margin-top:6px}
  .sig .v.ok{color:var(--ok)} .sig .v.bad{color:var(--danger)} .sig .v.gold{color:var(--gold)}
  .sig .d{color:var(--dim);font-size:11.5px;margin-top:6px}

  .stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 15px;box-shadow:var(--shadow)}
  .stat b{font-size:20px;font-weight:900;color:var(--accent)}
  .stat span{color:var(--sub);font-size:11.5px;display:block}
  .bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  button{background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:9px 14px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}

  table{width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;font-size:13.5px;box-shadow:var(--shadow)}
  th,td{padding:11px 12px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  th{background:var(--card2);color:var(--sub);font-size:12px;font-weight:800}
  tr:last-child td{border-bottom:none}
  .pill{display:inline-block;font-size:11px;font-weight:800;padding:3px 8px;border-radius:999px}
  .pill.live{background:rgba(53,208,165,.15);color:var(--ok)}
  .pill.dead{background:rgba(105,114,126,.15);color:var(--dim)}
  .pill.s4{background:rgba(255,201,77,.15);color:var(--gold)}
  .chain{color:var(--gold);font-weight:800}
  .chick{color:var(--chick);font-weight:800}
  .scroll{overflow-x:auto}
  .empty{text-align:center;color:var(--dim);padding:60px 20px}
  code{background:var(--card);padding:2px 7px;border-radius:6px;color:#ffb27a}
</style>
</head>
<body>
<div class="wrap">
  <h1>⛓️ 쇠사슬 운영자 화면 <span class="mode" id="modeBadge">…</span></h1>
  <p class="sub">핵심 신호 2개(4주 생존율 · 2차 크루 생성)로 수요를 판단하세요.</p>

  <div class="signals">
    <div class="sig"><div class="k">🎯 크루 4주 생존율</div><div class="v" id="sigSurv">–</div>
      <div class="d" id="sigSurvD">4주 이상 된 크루 중, 4주차에도 인증이 있는 비율 · 목표 50%+</div></div>
    <div class="sig"><div class="k">🌱 2차 크루 생성</div><div class="v gold" id="sig2nd">–</div>
      <div class="d">한 사람이 두 번째 크루를 또 만든 수 · 바이럴 신호(15%+ go)</div></div>
  </div>

  <div class="stats">
    <div class="stat"><b id="sCrews">0</b><span>크루</span></div>
    <div class="stat"><b id="sMembers">0</b><span>크루원</span></div>
    <div class="stat"><b id="sGuard">0</b><span>가디언</span></div>
    <div class="stat"><b id="sChecks">0</b><span>총 인증</span></div>
    <div class="stat"><b id="sActive">0</b><span>이번주 활성 크루</span></div>
  </div>

  <div class="bar">
    <button class="primary" onclick="load()">🔄 새로고침</button>
    <button onclick="exportCSV()">📥 크루 CSV</button>
    <button onclick="sample()">🧪 샘플 데이터</button>
  </div>

  <div class="scroll" id="tableWrap"></div>
</div>

<script src="config.js"></script>
<script src="db.js"></script>
<script>
const WEEK=7*24*3600*1000;
let crews=[], members=[], checkins=[];
const esc = s => (""+(s??"")).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const mOf = cid => members.filter(m=>String(m.crew_id)===String(cid));
const cOf = cid => checkins.filter(c=>String(c.crew_id)===String(cid));
const curWk = () => DB.weekStartTs(Date.now());

function survived4w(crew){
  const start=DB.weekStartTs(crew.created_at);
  const w4=start+3*WEEK;                       // 4주차 시작
  if(Date.now()<w4) return null;               // 아직 4주 안 됨 → 판정 제외
  const has=cOf(crew.id).some(c=>(c.type||"workout")==="workout" && DB.weekStartTs(c.created_at)>=w4 && DB.weekStartTs(c.created_at)<w4+WEEK);
  return has;
}
function activeThisWeek(crew){ return cOf(crew.id).some(c=>(c.type||"workout")==="workout" && DB.weekStartTs(c.created_at)===curWk()); }
function ownerName(crew){ const ms=mOf(crew.id).slice().sort((a,b)=>a.id-b.id); return ms.length?ms[0].name:""; }

function render(){
  const workoutMembers=members.filter(m=>m.role!=="guardian");
  document.getElementById("sCrews").textContent=crews.length;
  document.getElementById("sMembers").textContent=workoutMembers.length;
  document.getElementById("sGuard").textContent=members.filter(m=>m.role==="guardian").length;
  document.getElementById("sChecks").textContent=checkins.filter(c=>(c.type||"workout")==="workout").length;
  document.getElementById("sActive").textContent=crews.filter(activeThisWeek).length;

  // 4주 생존율
  const judged=crews.map(survived4w).filter(v=>v!==null);
  const surv=judged.filter(Boolean).length;
  const survEl=document.getElementById("sigSurv");
  if(judged.length){ const pct=Math.round(surv/judged.length*100);
    survEl.textContent=pct+"%"; survEl.className="v "+(pct>=50?"ok":"bad");
    document.getElementById("sigSurvD").textContent=`4주 이상 된 크루 ${judged.length}개 중 ${surv}개 생존 · 목표 50%+`;
  } else { survEl.textContent="–"; survEl.className="v"; document.getElementById("sigSurvD").textContent="아직 4주 넘은 크루가 없어요"; }

  // 2차 크루 생성: 같은 owner 이름이 만든 2번째+ 크루 수
  const byOwner={}; crews.slice().sort((a,b)=>a.id-b.id).forEach(c=>{ const o=ownerName(c); if(!o)return; (byOwner[o]=byOwner[o]||0)+0; byOwner[o]++; });
  const second=Object.values(byOwner).reduce((s,n)=>s+Math.max(0,n-1),0);
  const rate=crews.length?Math.round(second/crews.length*100):0;
  document.getElementById("sig2nd").textContent=`${second}건`;
  document.querySelector("#sig2nd").nextElementSibling.textContent=`전체 ${crews.length}크루 중 ${rate}% · 15%+면 강한 go`;

  if(!crews.length){
    document.getElementById("tableWrap").innerHTML=`<div class="empty">아직 크루가 없어요.<br><br><code>index.html</code>에서 크루가 생기면 여기 지표가 채워집니다.<br><br><button class="primary" onclick="sample()">🧪 샘플로 먼저 보기</button></div>`;
    return;
  }
  const rows=crews.map(c=>{
    const ms=mOf(c.id); const wm=ms.filter(m=>m.role!=="guardian");
    const r=DB.computeChain(c,ms,cOf(c.id));
    const s4=survived4w(c); const act=activeThisWeek(c);
    const wk=(Date.now()-new Date(c.created_at).getTime())/WEEK;
    return `<tr>
      <td><b>${esc(c.name)}</b><div style="color:var(--dim);font-size:11px">코드 ${esc(c.code)} · 주${c.goal}회</div></td>
      <td>${esc(ownerName(c))}</td>
      <td>${wm.length}${ms.length-wm.length?` <span style="color:var(--gold)">+${ms.length-wm.length}🙌</span>`:""}</td>
      <td class="chain">${r.chain}<span style="color:var(--dim)"> / 최고 ${r.best}</span></td>
      <td class="chick">🍗 ${r.chicken}</td>
      <td>${act?`<span class="pill live">활성</span>`:`<span class="pill dead">휴면</span>`}</td>
      <td>${s4===null?`<span style="color:var(--dim)">${wk.toFixed(1)}주</span>`:s4?`<span class="pill s4">4주 생존</span>`:`<span class="pill dead">이탈</span>`}</td>
    </tr>`;
  }).join("");
  document.getElementById("tableWrap").innerHTML=`<table><thead><tr>
    <th>크루</th><th>개설자</th><th>인원</th><th>고리</th><th>치킨</th><th>이번주</th><th>4주</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function exportCSV(){
  const cols=["id","created_at","name","code","goal","개설자","크루원","가디언","현재고리","최고고리","치킨","이번주활성","4주생존"];
  const rows=crews.map(c=>{ const ms=mOf(c.id); const r=DB.computeChain(c,ms,cOf(c.id)); const s4=survived4w(c);
    return {id:c.id,created_at:c.created_at,name:c.name,code:c.code,goal:c.goal,개설자:ownerName(c),
      크루원:ms.filter(m=>m.role!=="guardian").length,가디언:ms.filter(m=>m.role==="guardian").length,
      현재고리:r.chain,최고고리:r.best,치킨:r.chicken,이번주활성:activeThisWeek(c)?"Y":"N",
      "4주생존":s4===null?"미판정":s4?"생존":"이탈"};});
  const head=cols.join(",");
  const body=rows.map(r=>cols.map(k=>`"${(""+(r[k]??"")).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob(["﻿"+head+"\n"+body],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="쇠사슬_크루_"+new Date().toISOString().slice(0,10)+".csv"; a.click();
}

async function sample(){
  // 2주 전 개설 크루 1개(전원 성공) + 이번주 개설 1개 + 2차 크루(같은 개설자)
  const now=Date.now();
  const c1=await DB.createCrew({name:"새벽 여섯시 클럽",goal:2,ownerName:"민준"});
  const j1=await DB.joinCrew({code:c1.crew.code,name:"서연",role:"member"});
  const g1=await DB.joinCrew({code:c1.crew.code,name:"삼촌",role:"guardian"});
  for(const mid of [c1.member.id,j1.member.id]){ await DB.addCheckin({crewId:c1.crew.id,memberId:mid,name:"x",type:"workout",part:"가슴/등",note:"굿"}); await DB.addCheckin({crewId:c1.crew.id,memberId:mid,name:"x",type:"workout",part:"하체",note:""}); }
  await DB.addCheckin({crewId:c1.crew.id,memberId:g1.member.id,name:"삼촌",type:"cheer",part:"🔥",note:"화이팅!"});
  const c2=await DB.createCrew({name:"헬창 3인방",goal:3,ownerName:"민준"}); // 같은 개설자 → 2차 크루
  await DB.joinCrew({code:c2.crew.code,name:"도윤",role:"member"});
  await DB.addCheckin({crewId:c2.crew.id,memberId:c2.member.id,name:"x",type:"workout",part:"팔",note:""});
  load();
}

async function load(){
  [crews,members,checkins]=await Promise.all([DB.listAllCrews(),DB.listAllMembers(),DB.listAllCheckins()]);
  render();
}
(async function(){
  const m=await DB.mode(); const b=document.getElementById("modeBadge");
  if(m==="supabase"){ b.textContent="● 실시간 공용 DB"; b.className="mode live"; } else { b.textContent="로컬(이 기기)"; b.className="mode local"; }
  load();
})();
</script>
</body>
</html>
